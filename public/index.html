// FLASHCARD STUDY EXPERIENCE (Student)
// ═══════════════════════════════════════════════════════════════════════════════
function FlashcardStudy({ deck, email, onDone }) {
  const safeCards = deck?.cards || [];
  const [cardIndex, setCardIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [showHint, setShowHint] = useState(false);
  const [known, setKnown] = useState(new Set());
  const [stillLearning, setStillLearning] = useState(new Set());
  const [shuffled, setShuffled] = useState(() => safeCards.map((_, i) => i));
  const [mode, setMode] = useState("study");

  if (!safeCards.length) {
    return (
      <div style={{ ...S.testWrap, justifyContent: "center" }}>
        <div style={{ ...S.testCard, textAlign: "center", maxWidth: "520px" }}>
          <div style={{ fontSize: "3rem", marginBottom: "0.75rem" }}>📭</div>
          <h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.8rem", marginBottom: "0.5rem" }}>No Cards Yet</h2>
          <p style={{ color: "var(--muted)", marginBottom: "2rem" }}>This deck has no flashcards to study.</p>
          <button onClick={onDone} style={{ ...S.btn, ...S.btnGhost, width: "100%" }}>← Go Back</button>
        </div>
      </div>
    );
  }

  const currentIdx = shuffled[cardIndex];
  const card = safeCards[currentIdx];
  const total = shuffled.length;
  const progress = Math.round((cardIndex / total) * 100);

  const advance = (wasKnown) => {
    const realIdx = shuffled[cardIndex];
    if (wasKnown) {
      setKnown(prev => new Set([...prev, realIdx]));
      setStillLearning(prev => { const s = new Set(prev); s.delete(realIdx); return s; });
    } else {
      setStillLearning(prev => new Set([...prev, realIdx]));
      setKnown(prev => { const s = new Set(prev); s.delete(realIdx); return s; });
    }
    setFlipped(false);
    setShowHint(false);
    if (cardIndex + 1 >= total) {
      setMode("results");
    } else {
      setCardIndex(i => i + 1);
    }
  };

  const restart = (onlyLearning) => {
    const base = onlyLearning ? [...stillLearning] : safeCards.map((_, i) => i);
    const reshuffled = [...base].sort(() => Math.random() - 0.5);
    if (reshuffled.length === 0) return;
    setShuffled(reshuffled);
    setCardIndex(0); setFlipped(false); setShowHint(false);
    setKnown(new Set()); setStillLearning(new Set());
    setMode("study");
  };

  const doShuffle = () => {
    setShuffled(safeCards.map((_, i) => i).sort(() => Math.random() - 0.5));
    setCardIndex(0); setFlipped(false); setShowHint(false);
    setKnown(new Set()); setStillLearning(new Set());
  };

  if (mode === "results") {
    const knownCount = known.size;
    const learningCount = stillLearning.size;
    const pct = total > 0 ? Math.round((knownCount / total) * 100) : 0;
    return (
      <div style={{ ...S.testWrap, justifyContent: "center" }}>
        <div style={{ ...S.testCard, textAlign: "center", maxWidth: "520px" }}>
          <div style={{ fontSize: "3rem", marginBottom: "0.75rem" }}>{pct >= 80 ? "🏆" : pct >= 50 ? "📈" : "💪"}</div>
          <h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: "2rem", marginBottom: "0.5rem" }}>Round Complete!</h2>
          <p style={{ color: "var(--muted)", marginBottom: "2rem" }}>{deck.title}</p>
          <div style={{ display: "flex", gap: "1rem", justifyContent: "center", marginBottom: "2rem" }}>
            <div style={{ background: "#d4edda", borderRadius: "12px", padding: "1.25rem 1.75rem", minWidth: "100px" }}>
              <div style={{ fontSize: "2rem", fontFamily: "'DM Serif Display',serif", color: "#2d6a4f" }}>{knownCount}</div>
              <div style={{ fontSize: "0.8rem", color: "#2d6a4f", fontWeight: 600 }}>Got It ✓</div>
            </div>
            <div style={{ background: "#fde8e4", borderRadius: "12px", padding: "1.25rem 1.75rem", minWidth: "100px" }}>
              <div style={{ fontSize: "2rem", fontFamily: "'DM Serif Display',serif", color: "#c84b31" }}>{learningCount}</div>
              <div style={{ fontSize: "0.8rem", color: "#c84b31", fontWeight: 600 }}>Still Learning</div>
            </div>
            <div style={{ background: "var(--cream)", borderRadius: "12px", padding: "1.25rem 1.75rem", minWidth: "100px" }}>
              <div style={{ fontSize: "2rem", fontFamily: "'DM Serif Display',serif" }}>{pct}%</div>
              <div style={{ fontSize: "0.8rem", color: "var(--muted)", fontWeight: 600 }}>Mastered</div>
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
            {learningCount > 0 && <button onClick={() => restart(true)} style={{ ...S.btn, ...S.btnAccent, width: "100%" }}>🔁 Study {learningCount} Remaining Card{learningCount !== 1 ? "s" : ""}</button>}
            <button onClick={() => restart(false)} style={{ ...S.btn, ...S.btnPrimary, width: "100%" }}>🔀 Restart All Cards (Shuffled)</button>
            <button onClick={onDone} style={{ ...S.btn, ...S.btnGhost, width: "100%" }}>Done</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ ...S.testWrap, justifyContent: "flex-start", paddingTop: "2.5rem" }}>
      <div style={{ width: "100%", maxWidth: "680px", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1.5rem" }}>
        <div>
          <div style={{ color: "rgba(247,244,239,0.9)", fontWeight: 600, fontSize: "1rem" }}>{deck.title}</div>
          <div style={{ color: "rgba(247,244,239,0.4)", fontSize: "0.8rem" }}>{email}</div>
        </div>
        <div style={{ display: "flex", gap: "0.5rem" }}>
          <button onClick={doShuffle} style={{ ...S.btn, background: "rgba(255,255,255,0.08)", color: "var(--paper)", border: "1px solid rgba(255,255,255,0.15)", padding: "0.4rem 0.8rem", fontSize: "0.85rem" }}>🔀 Shuffle</button>
          <button onClick={onDone} style={{ ...S.btn, background: "rgba(255,255,255,0.08)", color: "var(--paper)", border: "1px solid rgba(255,255,255,0.15)", padding: "0.4rem 0.8rem", fontSize: "0.85rem" }}>✕ Exit</button>
        </div>
      </div>

      <div style={{ width: "100%", maxWidth: "680px", marginBottom: "0.5rem", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ color: "rgba(247,244,239,0.5)", fontSize: "0.8rem" }}>Card {cardIndex + 1} of {total}</span>
        <div style={{ display: "flex", gap: "0.75rem", fontSize: "0.8rem" }}>
          <span style={{ color: "#6fcf97" }}>✓ {known.size}</span>
          <span style={{ color: "#eb5757" }}>✗ {stillLearning.size}</span>
        </div>
      </div>
      <div style={{ width: "100%", maxWidth: "680px", height: "4px", background: "rgba(255,255,255,0.1)", borderRadius: "2px", marginBottom: "1.5rem" }}>
        <div style={{ height: "100%", width: progress + "%", background: "linear-gradient(90deg, #2d6a4f, #52b788)", borderRadius: "2px", transition: "width 0.4s" }} />
      </div>

      <div onClick={() => { setFlipped(f => !f); }}
        style={{ width: "100%", maxWidth: "680px", minHeight: "280px", background: flipped ? "linear-gradient(135deg, #1a3a2a 0%, #2d6a4f 100%)" : "linear-gradient(135deg, #1a1815 0%, #2a2620 100%)", border: "2px solid " + (flipped ? "rgba(82,183,136,0.4)" : "rgba(255,255,255,0.1)"), borderRadius: "20px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "2.5rem", textAlign: "center", transition: "all 0.3s ease", boxShadow: "0 20px 60px rgba(0,0,0,0.4)", position: "relative", userSelect: "none" }}>
        <div style={{ position: "absolute", top: "1rem", left: "1.25rem", fontSize: "0.7rem", letterSpacing: "0.12em", textTransform: "uppercase", color: flipped ? "rgba(82,183,136,0.7)" : "rgba(247,244,239,0.3)", fontWeight: 600 }}>
          {flipped ? "Answer" : "Question"}
        </div>
        <div style={{ position: "absolute", top: "1rem", right: "1.25rem", fontSize: "0.75rem", color: "rgba(247,244,239,0.2)" }}>tap to flip</div>
        <p style={{ fontSize: "clamp(1rem, 3vw, 1.5rem)", color: "var(--paper)", lineHeight: 1.5, fontFamily: flipped ? "'DM Sans',sans-serif" : "'DM Serif Display',serif" }}>
          {flipped ? card.back : card.front}
        </p>
        {!flipped && card.hint && showHint && (
          <p style={{ marginTop: "1rem", fontSize: "0.85rem", color: "rgba(247,244,239,0.5)", fontStyle: "italic" }}>💡 {card.hint}</p>
        )}
      </div>

      {card.hint && !flipped && (
        <button onClick={() => setShowHint(h => !h)} style={{ marginTop: "0.75rem", background: "none", border: "none", color: "rgba(247,244,239,0.4)", fontSize: "0.85rem", cursor: "pointer", textDecoration: "underline" }}>
          {showHint ? "Hide hint" : "Show hint 💡"}
        </button>
      )}

      <div style={{ width: "100%", maxWidth: "680px", marginTop: "1.5rem" }}>
        {flipped ? (
          <div style={{ display: "flex", gap: "1rem" }}>
            <button onClick={() => advance(false)} style={{ flex: 1, ...S.btn, background: "#c84b31", color: "var(--white)", fontSize: "1rem", padding: "0.9rem" }}>✗ Still Learning</button>
            <button onClick={() => advance(true)} style={{ flex: 1, ...S.btn, background: "#2d6a4f", color: "var(--white)", fontSize: "1rem", padding: "0.9rem" }}>✓ Got It!</button>
          </div>
        ) : (
          <div style={{ textAlign: "center", color: "rgba(247,244,239,0.3)", fontSize: "0.85rem" }}>Tap the card to reveal the answer, then rate yourself</div>
        )}
      </div>

      <div style={{ display: "flex", gap: "0.3rem", marginTop: "1.5rem", flexWrap: "wrap", justifyContent: "center", maxWidth: "680px" }}>
        {shuffled.map((realIdx, i) => {
          const isKnown = known.has(realIdx);
          const isLearning = stillLearning.has(realIdx);
          const isCurrent = i === cardIndex;
          return (
            <div key={i} style={{ width: isCurrent ? "20px" : "8px", height: "8px", borderRadius: "4px", background: isCurrent ? "var(--paper)" : isKnown ? "#52b788" : isLearning ? "#eb5757" : "rgba(255,255,255,0.2)", transition: "all 0.3s" }} />
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// FORGOT PASSWORD
// ═══════════════════════════════════════════════════════════════════════════════
function ForgotPassword({ onBack }) {
  const [email, setEmail] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [sent, setSent] = useState(false);

  const handleSubmit = async () => {
    if (!email.trim()) { setErr("Please enter your email address."); return; }
    if (!/\S+@\S+\.\S+/.test(email)) { setErr("Please enter a valid email address."); return; }
    setLoading(true); setErr("");
    try {
      await apiFetch('/auth/forgot-password', { method: 'POST', body: { email: email.trim().toLowerCase() } });
      setSent(true);
    } catch (e) {
      // Always show success to avoid email enumeration — but surface real server errors
      if (e.message && e.message !== 'Request failed') {
        setErr(e.message);
      } else {
        setSent(true); // Don't reveal if account exists
      }
    } finally { setLoading(false); }
  };

  return (
    <div style={S.authWrap}>
      <div style={S.authBox}>
        <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", marginBottom: "1.5rem" }}>← Back to Login</button>
        <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>🔑</div>
        <h2 style={S.authTitle}>Forgot Password</h2>

        {sent ? (
          <>
            <div style={{ ...S.success, marginBottom: "1.5rem" }}>
              ✅ If an account with that email exists, a password reset link has been sent. Check your inbox (and spam folder).
            </div>
            <p style={{ color: "var(--muted)", fontSize: "0.9rem", marginBottom: "1.5rem", lineHeight: 1.6 }}>
              The link will expire in <strong>1 hour</strong>. If you don't receive an email within a few minutes, double-check the address you used to register.
            </p>
            <button onClick={onBack} style={{ ...S.btn, ...S.btnPrimary, width: "100%" }}>Return to Login</button>
          </>
        ) : (
          <>
            <p style={S.authSub}>Enter your account email and we'll send you a reset link.</p>
            {err && <div style={S.error}>{err}</div>}
            <div style={S.fieldGroup}>
              <label style={S.label}>Email Address</label>
              <input
                style={S.input}
                type="email"
                value={email}
                onChange={e => setEmail(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleSubmit()}
                placeholder="teacher@school.edu"
                autoFocus
              />
            </div>
            <button onClick={handleSubmit} disabled={loading} style={{ ...S.btn, ...S.btnPrimary, width: "100%" }}>
              {loading ? "Sending..." : "Send Reset Link"}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// RESET PASSWORD
// ═══════════════════════════════════════════════════════════════════════════════
function ResetPassword({ token, onDone, onBack }) {
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [done, setDone] = useState(false);
  const [showPw, setShowPw] = useState(false);

  // No token means this page was reached without a valid reset link
  if (!token) {
    return (
      <div style={S.authWrap}>
        <div style={S.authBox}>
          <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>⚠️</div>
          <h2 style={S.authTitle}>Invalid Reset Link</h2>
          <p style={{ color: "var(--muted)", fontSize: "0.9rem", marginBottom: "1.5rem", lineHeight: 1.6 }}>
            This password reset link is missing or invalid. Please request a new one from the login page.
          </p>
          <button onClick={onBack} style={{ ...S.btn, ...S.btnPrimary, width: "100%" }}>← Back to Login</button>
        </div>
      </div>
    );
  }

  const handleReset = async () => {
    if (!password.trim()) { setErr("Please enter a new password."); return; }
    if (password.length < 8) { setErr("Password must be at least 8 characters."); return; }
    if (password !== confirm) { setErr("Passwords do not match."); return; }
    setLoading(true); setErr("");
    try {
      await apiFetch('/auth/reset-password', { method: 'POST', body: { token, password } });
      setDone(true);
    } catch (e) {
      setErr(e.message || "Reset failed. The link may have expired. Please request a new one.");
    } finally { setLoading(false); }
  };

  // Password strength indicator
  const strength = (() => {
    if (!password) return null;
    let score = 0;
    if (password.length >= 8) score++;
    if (password.length >= 12) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;
    if (score <= 1) return { label: "Weak", color: "#c84b31", width: "25%" };
    if (score <= 2) return { label: "Fair", color: "#e87b1e", width: "50%" };
    if (score <= 3) return { label: "Good", color: "#b8860b", width: "75%" };
    return { label: "Strong", color: "#2d6a4f", width: "100%" };
  })();

  return (
    <div style={S.authWrap}>
      <div style={S.authBox}>
        {!done && (
          <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", marginBottom: "1.5rem" }}>← Back to Login</button>
        )}
        <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>{done ? "🎉" : "🔒"}</div>
        <h2 style={S.authTitle}>{done ? "Password Reset!" : "Set New Password"}</h2>

        {done ? (
          <>
            <p style={{ color: "var(--muted)", fontSize: "0.95rem", marginBottom: "1.5rem", lineHeight: 1.6 }}>
              Your password has been updated successfully. You can now sign in with your new password.
            </p>
            <button onClick={onDone} style={{ ...S.btn, ...S.btnPrimary, width: "100%" }}>Sign In Now</button>
          </>
        ) : (
          <>
            <p style={S.authSub}>Choose a strong new password for your account.</p>
            {err && <div style={S.error}>{err}</div>}
            <div style={S.fieldGroup}>
              <label style={S.label}>New Password</label>
              <div style={{ position: "relative" }}>
                <input
                  style={{ ...S.input, paddingRight: "3rem" }}
                  type={showPw ? "text" : "password"}
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  placeholder="Min. 8 characters"
                  autoFocus
                />
                <button
                  type="button"
                  onClick={() => setShowPw(s => !s)}
                  style={{ position: "absolute", right: "0.75rem", top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: "1rem", color: "var(--muted)" }}
                >
                  {showPw ? "🙈" : "👁"}
                </button>
              </div>
              {strength && (
                <div style={{ marginTop: "0.5rem" }}>
                  <div style={{ height: "4px", background: "var(--border)", borderRadius: "2px", overflow: "hidden" }}>
                    <div style={{ height: "100%", width: strength.width, background: strength.color, borderRadius: "2px", transition: "width 0.3s, background 0.3s" }} />
                  </div>
                  <div style={{ fontSize: "0.75rem", color: strength.color, marginTop: "0.25rem", fontWeight: 600 }}>{strength.label}</div>
                </div>
              )}
            </div>
            <div style={S.fieldGroup}>
              <label style={S.label}>Confirm New Password</label>
              <input
                style={{ ...S.input, borderColor: confirm && password !== confirm ? "var(--danger)" : undefined }}
                type={showPw ? "text" : "password"}
                value={confirm}
                onChange={e => setConfirm(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleReset()}
                placeholder="Re-enter new password"
              />
              {confirm && password !== confirm && (
                <div style={{ fontSize: "0.78rem", color: "var(--danger)", marginTop: "0.25rem" }}>Passwords do not match</div>
              )}
            </div>
            <button onClick={handleReset} disabled={loading} style={{ ...S.btn, ...S.btnPrimary, width: "100%", opacity: loading ? 0.7 : 1 }}>
              {loading ? "Resetting..." : "Reset Password"}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// INVALIDATED SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
function InvalidatedScreen({ onHome }) {
  return (
    <div style={S.testWrap}>
      <div style={{ ...S.testCard, textAlign: "center" }}>
        <div style={{ fontSize: "3rem", marginBottom: "1rem" }}>⚠️</div>
        <h2 style={{ ...S.pageTitle, marginBottom: "0.5rem" }}>Test Invalidated</h2>
        <p style={{ color: "var(--muted)", marginBottom: "1.5rem" }}>
          You left the test or put it in the background. Your test has been submitted with a score of 0.
          Please contact your teacher to request a retake.
        </p>
        <button onClick={onHome} style={{ ...S.btn, ...S.btnPrimary }}>Return Home</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [screen, setScreenState] = useState("landing");

  const setScreen = (newScreen) => {
    window.history.pushState({ screen: newScreen }, "", "");
    setScreenState(newScreen);
  };

  useEffect(() => {
    const handlePop = (e) => setScreenState(e.state?.screen || "landing");
    window.addEventListener("popstate", handlePop);
    return () => window.removeEventListener("popstate", handlePop);
  }, []);
  const [teacher, setTeacher] = useState(null);
  const [studentSession, setStudentSession] = useState(null);
  const [flashcardSession, setFlashcardSession] = useState(null);
  const [resetToken, setResetToken] = useState(null);

  // Auto-restore session from stored token, and check for password reset token in URL
  useEffect(() => {
    // Check for reset token in URL query params
    const params = new URLSearchParams(window.location.search);
    const rt = params.get("reset_token");
    if (rt) {
      setResetToken(rt);
      setScreenState("reset-password");
      // Clean the token from the URL so it isn't bookmarked or shared
      window.history.replaceState({}, "", window.location.pathname);
      return;
    }

    const token = localStorage.getItem('qt_token');
    if (token) {
      const authTimeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 4000));
      Promise.race([apiFetch('/auth/me'), authTimeout])
        .then(data => {
          if (data.teacher) {
            setTeacher(data.teacher);
            setScreenState('teacher-dash');
          } else {
            localStorage.removeItem('qt_token');
          }
        })
        .catch(() => {
          localStorage.removeItem('qt_token');
        });
    }
  }, []);

  return (
    <div style={S.app}>
      <FontLink />
      {screen === "landing" && (
        <Landing
          onTeacher={() => setScreen("teacher-login")}
          onStudent={() => setScreen("student-login")}
          onFlashcards={() => setScreen("flashcard-login")}
        />
      )}
      {screen === "teacher-login" && (
        <TeacherLogin
          onLogin={(t) => { setTeacher(t); setScreen("teacher-dash"); }}
          onBack={() => setScreen("landing")}
          onRegister={() => setScreen("teacher-register")}
          onForgotPassword={() => setScreen("forgot-password")}
        />
      )}
      {screen === "teacher-register" && (
        <TeacherRegister
          onLogin={(t) => { setTeacher(t); setScreen("teacher-dash"); }}
          onBack={() => setScreen("teacher-login")}
          onForgotPassword={() => setScreen("forgot-password")}
        />
      )}
      {screen === "forgot-password" && (
        <ForgotPassword onBack={() => setScreen("teacher-login")} />
      )}
      {screen === "reset-password" && (
        <ResetPassword
          token={resetToken}
          onDone={() => setScreen("teacher-login")}
          onBack={() => setScreen("teacher-login")}
        />
      )}
      {screen === "student-login" && (
        <StudentLogin
          onEnter={(s) => { setStudentSession(s); setScreen("student-test"); }}
          onBack={() => setScreen("landing")}
        />
      )}
      {screen === "flashcard-login" && (
        <FlashcardLogin
          onEnter={(s) => { setFlashcardSession(s); setScreen("flashcard-study"); }}
          onBack={() => setScreen("landing")}
        />
      )}
      {screen === "teacher-dash" && teacher && (
        <TeacherDashboard teacher={teacher} onLogout={() => { localStorage.removeItem("qt_token"); setTeacher(null); setScreen("landing"); }} />
      )}
      {screen === "student-test" && studentSession && (
        <StudentTest
          test={studentSession.test}
          email={studentSession.email}
          onDone={() => setScreen("landing")}
          onInvalidate={() => setScreen("invalidated")}
        />
      )}
      {screen === "flashcard-study" && flashcardSession && (
        <FlashcardStudy
          deck={flashcardSession.deck}
          email={flashcardSession.email}
          onDone={() => setScreen("landing")}
        />
      )}
      {screen === "invalidated" && (
        <InvalidatedScreen onHome={() => setScreen("landing")} />
      )}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));

  </script>

    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('splash').classList.add('hidden'), 700);
    });

    setTimeout(() => { var s = document.getElementById('splash'); if (s) s.classList.add('hidden'); }, 1500);
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    }
  </script>
