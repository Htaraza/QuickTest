// ─── API Client ──────────────────────────────────────────────────────────────
const API_BASE = window.QT_API_BASE || '/api';

async function apiFetch(path, options = {}) {
  const token = localStorage.getItem('qt_token');
  const res = await fetch(API_BASE + path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: 'Bearer ' + token } : {}),
      ...(options.headers || {})
    },
    body: options.body ? JSON.stringify(options.body) : undefined
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// localStorage fallback storage (kept for offline/demo mode)
const storage = {
  async get(key) {
    try { const v = localStorage.getItem('qt:' + key); return v ? JSON.parse(v) : null; }
    catch { return null; }
  },
  async set(key, val) {
    try { localStorage.setItem('qt:' + key, JSON.stringify(val)); } catch {}
  },
  async list(prefix) {
    try {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith('qt:' + prefix)) keys.push(k.slice(3));
      }
      return keys;
    } catch { return []; }
  }
};
window._qtDelete = (key) => { try { localStorage.removeItem('qt:' + key); } catch {} };

// TEACHER LOGIN
// ═══════════════════════════════════════════════════════════════════════════════
function TeacherLogin({ onLogin, onBack, onRegister }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");

  const [loading, setLoading] = useState(false);
  const handleLogin = async () => {
    if (!email.trim() || !password.trim()) { setErr("Please fill in both fields."); return; }
    setLoading(true); setErr("");
    try {
      const data = await apiFetch('/auth/login', { method: 'POST', body: { email, password } });
      localStorage.setItem('qt_token', data.token);
      onLogin(data.teacher);
    } catch (err) {
      setErr(err.message || "Invalid email or password.");
    } finally { setLoading(false); }
  };

  return (
    <div style={S.authWrap}>
      <div style={S.authBox}>
        <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", marginBottom: "1.5rem" }}>← Back</button>
        <h2 style={S.authTitle}>Teacher Login</h2>
        <p style={S.authSub}>Sign in to manage your tests</p>
        {err && <div style={S.error}>{err}</div>}
        <div style={S.fieldGroup}>
          <label style={S.label}>Email</label>
          <input style={S.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="teacher@school.edu" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Password</label>
          <input style={S.input} type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="••••••••" />
        </div>
        <button onClick={handleLogin} disabled={loading} style={{ ...S.btn, ...S.btnPrimary, width: "100%" }}>{loading ? "Signing in..." : "Sign In"}</button>
        <div style={{ textAlign: "center", marginTop: "1.25rem" }}>
          <span style={{ fontSize: "0.85rem", color: "var(--muted)" }}>No account? </span>
          <button onClick={onRegister} style={{ background: "none", border: "none", color: "var(--ink)", fontSize: "0.85rem", fontWeight: 600, cursor: "pointer", textDecoration: "underline" }}>Create teacher account</button>
        </div>
      </div>
    </div>
  );
}

// TEACHER REGISTER
// ═══════════════════════════════════════════════════════════════════════════════
function TeacherRegister({ onLogin, onBack }) {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const handleRegister = async () => {
    if (!name.trim() || !email.trim() || !password.trim()) { setErr("All fields are required."); return; }
    if (password !== confirm) { setErr("Passwords do not match."); return; }
    if (password.length < 8) { setErr("Password must be at least 8 characters."); return; }
    setLoading(true); setErr("");
    try {
      const data = await apiFetch('/auth/register', { method: 'POST', body: { name, email, password } });
      localStorage.setItem('qt_token', data.token);
      onLogin(data.teacher);
    } catch (err) {
      setErr(err.message || "Registration failed.");
    } finally { setLoading(false); }
  };

  return (
    <div style={S.authWrap}>
      <div style={S.authBox}>
        <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", marginBottom: "1.5rem" }}>← Back</button>
        <h2 style={S.authTitle}>Create Account</h2>
        <p style={S.authSub}>Register as a teacher to get started</p>
        {err && <div style={S.error}>{err}</div>}
        <div style={S.fieldGroup}>
          <label style={S.label}>Your Name</label>
          <input style={S.input} value={name} onChange={e => setName(e.target.value)} placeholder="Ms. Johnson" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Email</label>
          <input style={S.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="teacher@school.edu" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Password</label>
          <input style={S.input} type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Min. 8 characters" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Confirm Password</label>
          <input style={S.input} type="password" value={confirm} onChange={e => setConfirm(e.target.value)} onKeyDown={e => e.key === "Enter" && handleRegister()} placeholder="Re-enter password" />
        </div>
        <button onClick={handleRegister} disabled={loading} style={{ ...S.btn, ...S.btnPrimary, width: "100%" }}>
          {loading ? "Creating account..." : "Create Account"}
        </button>
      </div>
    </div>
  );
}

// STUDENT LOGIN
// ═══════════════════════════════════════════════════════════════════════════════
function StudentLogin({ onEnter, onBack }) {
  const [email, setEmail] = useState("");
  const [code, setCode] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const handleEnter = async () => {
    if (!email.trim() || !code.trim()) { setErr("Please fill in both fields."); return; }
    if (!/\S+@\S+\.\S+/.test(email)) { setErr("Please enter a valid email."); return; }
    setLoading(true);
    setErr("");
    let foundTest = null;
    try {
      const data = await apiFetch('/tests/by-code/' + code.toUpperCase());
      foundTest = data.test;
    } catch (e) {
      setErr("Invalid or inactive test code."); setLoading(false); return;
    }
    // check if student already submitted
    try {
      const chk = await apiFetch(`/submissions/check?testId=${foundTest.id}&email=${encodeURIComponent(email.toLowerCase())}`);
      if (chk.exists && !chk.retakeAllowed) {
        setErr("You have already taken this test. Contact your teacher to retake.");
        setLoading(false); return;
      }
    } catch (e) { /* no submission yet, fine */ }
    setLoading(false);
    onEnter({ test: foundTest, email: email.toLowerCase() });
  };

  return (
    <div style={S.authWrap}>
      <div style={S.authBox}>
        <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", marginBottom: "1.5rem" }}>← Back</button>
        <h2 style={S.authTitle}>Student Portal</h2>
        <p style={S.authSub}>Enter your details to access your test</p>
        {err && <div style={S.error}>{err}</div>}
        <div style={S.fieldGroup}>
          <label style={S.label}>Your Email</label>
          <input style={S.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="student@school.edu" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Test Code</label>
          <input type="text" value={code} onChange={e => setCode(e.target.value.toUpperCase())} onKeyDown={e => e.key === "Enter" && handleEnter()} placeholder="ABC123" maxLength={8} style={{ ...S.input, letterSpacing: "0.2em", textTransform: "uppercase" }} />
        </div>
        <button onClick={handleEnter} disabled={loading} style={{ ...S.btn, ...S.btnPrimary, width: "100%" }}>
          {loading ? "Checking..." : "Enter Test →"}
        </button>
      </div>
    </div>
  );
}

// TEACHER DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function TeacherDashboard({ teacher, onLogout }) {
  const [view, setViewState] = useState("tests");
  const [tests, setTests] = useState([]);
  const [decks, setDecks] = useState([]);
  const [editingTest, setEditingTest] = useState(null);
  const [editingDeck, setEditingDeck] = useState(null);

  const setView = (newView) => {
    window.history.pushState({ screen: "teacher-dash", view: newView }, "", "");
    setViewState(newView);
  };

  useEffect(() => {
    const handlePop = (e) => {
      if (e.state?.screen === "teacher-dash" && e.state?.view) {
        setViewState(e.state.view);
      }
    };
    window.addEventListener("popstate", handlePop);
    return () => window.removeEventListener("popstate", handlePop);
  }, []);
  const [selectedTestId, setSelectedTestId] = useState(null);
  const [msg, setMsg] = useState("");

  const loadTests = useCallback(async () => {
    try {
      const data = await apiFetch('/tests');
      setTests(data.tests || []);
    } catch (e) { console.error('loadTests', e); }
  }, []);

  const loadDecks = useCallback(async () => {
    try {
      const data = await apiFetch('/decks');
      setDecks(data.decks || []);
    } catch (e) { console.error('loadDecks', e); }
  }, []);

  useEffect(() => { loadTests(); loadDecks(); }, [loadTests, loadDecks]);

  const saveTest = async (test, noNav = false) => {
    try {
      let saved;
      if (test.id && tests.find(t => t.id === test.id)) {
        saved = await apiFetch('/tests/' + test.id, { method: 'PUT', body: test });
        setTests(prev => prev.map(t => t.id === saved.test.id ? saved.test : t));
      } else {
        saved = await apiFetch('/tests', { method: 'POST', body: test });
        setTests(prev => [saved.test, ...prev]);
      }
      if (!noNav) setView('tests');
    } catch (e) { flash('Error saving test: ' + e.message); }
  };
  const saveDeck = async (deck, noNav = false) => {
    try {
      let saved;
      if (deck.id && decks.find(d => d.id === deck.id)) {
        saved = await apiFetch('/decks/' + deck.id, { method: 'PUT', body: deck });
        setDecks(prev => prev.map(d => d.id === saved.deck.id ? saved.deck : d));
      } else {
        saved = await apiFetch('/decks', { method: 'POST', body: deck });
        setDecks(prev => [saved.deck, ...prev]);
      }
      if (!noNav) setView('decks');
    } catch (e) { flash('Error saving deck: ' + e.message); }
  };
  const deleteTest = async (id) => {
    try { await apiFetch('/tests/' + id, { method: 'DELETE' }); setTests(prev => prev.filter(t => t.id !== id)); flash('Test deleted.'); }
    catch (e) { flash('Error deleting: ' + e.message); }
  };
  const deleteDeck = async (id) => {
    try { await apiFetch('/decks/' + id, { method: 'DELETE' }); setDecks(prev => prev.filter(d => d.id !== id)); flash('Deck deleted.'); }
    catch (e) { flash('Error deleting: ' + e.message); }
  };
  const flash = (m) => { setMsg(m); setTimeout(() => setMsg(""), 3000); };

  return (
    <div style={S.dashWrap}>
      <div style={S.sidebar}>
        <h2 style={S.sidebarTitle}>QuickTest</h2>
        <div style={{ fontSize: "0.8rem", color: "var(--muted)", marginBottom: "0.75rem" }}>{teacher.name || teacher.email}</div>
        <div style={{ height: "1px", background: "rgba(255,255,255,0.08)", marginBottom: "0.75rem" }} />
        <div style={{ fontSize: "0.7rem", letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(247,244,239,0.3)", padding: "0 1rem", marginBottom: "0.3rem" }}>Tests</div>
        {[{ id: "tests", icon: "📋", label: "My Tests" }, { id: "create", icon: "✏️", label: "Create Test" }].map(n => (
          <div key={n.id} style={{ ...S.navItem, ...(view === n.id || (view === "edit" && n.id === "create") ? S.navItemActive : {}) }}
            onClick={() => { setView(n.id); if (n.id === "create") setEditingTest(null); }}>
            {n.icon} {n.label}
          </div>
        ))}
        <div style={{ height: "1px", background: "rgba(255,255,255,0.08)", margin: "0.75rem 0 0.5rem" }} />
        <div style={{ fontSize: "0.7rem", letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(247,244,239,0.3)", padding: "0 1rem", marginBottom: "0.3rem" }}>Flashcards</div>
        {[{ id: "decks", icon: "🃏", label: "My Decks" }, { id: "create-deck", icon: "➕", label: "Create Deck" }].map(n => (
          <div key={n.id} style={{ ...S.navItem, ...(view === n.id || (view === "edit-deck" && n.id === "create-deck") ? S.navItemActive : {}) }}
            onClick={() => { setView(n.id); if (n.id === "create-deck") setEditingDeck(null); }}>
            {n.icon} {n.label}
          </div>
        ))}
        <div style={{ marginTop: "auto" }}>
          <div style={{ ...S.navItem }} onClick={onLogout}>🚪 Log Out</div>
        </div>
      </div>
      <div style={S.main}>
        {msg && <div style={{ ...S.success, position: "fixed", top: "1rem", right: "1rem", zIndex: 999 }}>{msg}</div>}
        {view === "tests" && <TestList tests={tests} onEdit={t => { setEditingTest(t); setView("edit"); }} onDelete={deleteTest} onGrades={t => { setSelectedTestId(t.id); setView("grades"); }} onSave={saveTest} flash={flash} onNew={() => setView("create")} />}
        {(view === "create" || view === "edit") && <TestBuilder test={editingTest} onSave={async (t) => { await saveTest(t); flash("Test saved!"); }} onCancel={() => setView("tests")} />}
        {view === "grades" && <GradesView testId={selectedTestId} tests={tests} onBack={() => setView("tests")} onSave={saveTest} flash={flash} />}
        {view === "decks" && <DeckList decks={decks} onEdit={d => { setEditingDeck(d); setView("edit-deck"); }} onDelete={deleteDeck} onSave={saveDeck} flash={flash} onNew={() => { setEditingDeck(null); setView("create-deck"); }} />}
        {(view === "create-deck" || view === "edit-deck") && <DeckBuilder deck={editingDeck} onSave={async (d) => { await saveDeck(d); flash("Deck saved!"); }} onCancel={() => setView("decks")} />}
      </div>
    </div>
  );
}
// ─── TEST LIST ────────────────────────────────────────────────────────────────

  return (
    <>
      <div style={S.topBar}>
        <div>

        <button onClick={onNew} style={{ ...S.btn, ...S.btnPrimary }}>+ Create New Test</button>

      {tests.length === 0 && (
        <div style={{ ...S.card, textAlign: "center", padding: "4rem" }}>
          <div style={{ fontSize: "3rem", marginBottom: "1rem" }}>📋</div>
          <h3 style={{ marginBottom: "0.5rem" }}>No tests yet</h3>

          <button onClick={onNew} style={{ ...S.btn, ...S.btnPrimary }}>Create Test</button>
        </div>
      )}
      <div style={S.grid}>
        {tests.map(test => (
          <div key={test.id} style={S.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.5rem" }}>
              <h3 style={S.cardTitle}>{test.title}</h3>
              <span style={{ ...S.badge, ...(test.status === "active" ? S.badgeActive : test.status === "closed" ? S.badgeClosed : S.badgeDraft) }}>
                {test.status}
              </span>
            </div>
            <p style={S.cardMeta}>{test.questions?.length || 0} questions · {test.questions?.reduce((s, q) => s + (q.points || 0), 0)} pts</p>
            <div style={{ background: "var(--cream)", borderRadius: "8px", padding: "0.6rem 0.8rem", marginBottom: "1rem", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: "0.8rem", color: "var(--muted)" }}>Code:</span>
              <span style={{ fontFamily: "monospace", fontWeight: 700, letterSpacing: "0.15em", fontSize: "1.1rem" }}>{test.code}</span>
              <button onClick={() => regenerateCode(test)} title="New code" style={{ background: "none", border: "none", cursor: "pointer", fontSize: "1rem" }}>🔄</button>
            </div>
            <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap" }}>

              <button onClick={() => toggleStatus(test)} style={{ ...S.btn, background: test.status === "active" ? "#fde8e4" : "#d4edda", color: test.status === "active" ? "#c84b31" : "#2d6a4f", border: "none", fontSize: "0.8rem", padding: "0.4rem 0.8rem", borderRadius: "8px" }}>
                {test.status === "active" ? "Close" : "Activate"}
              </button>
              <button onClick={() => onGrades(test)} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.4rem 0.8rem" }}>📊 Grades</button>
              <button onClick={() => onDelete(test.id)} style={{ ...S.btn, background: "none", border: "none", color: "var(--danger)", fontSize: "0.8rem", padding: "0.4rem 0.8rem", borderRadius: "8px" }}>🗑</button>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

// ─── TEST BUILDER ─────────────────────────────────────────────────────────────
function TestBuilder({ test, onSave, onCancel }) {
  const [title, setTitle] = useState(test?.title || "");
  const [description, setDescription] = useState(test?.description || "");
  const [inApp, setInApp] = useState(test?.inApp !== false);
  const [questions, setQuestions] = useState(test?.questions || []);
  const [err, setErr] = useState("");

  const addQuestion = (type) => {
    setQuestions([...questions, {
      id: generateId(), type,
      text: "", points: 1,
      options: type === "essay" ? [] : ["", ""],
      correctAnswers: [],
      required: true
    }]);
  };

  const updateQuestion = (idx, patch) => {
    setQuestions(questions.map((q, i) => i === idx ? { ...q, ...patch } : q));
  };

  const removeQuestion = (idx) => {
    setQuestions(questions.filter((_, i) => i !== idx));
  };

  const moveQuestion = (idx, dir) => {
    const qs = [...questions];
    const target = idx + dir;
    if (target < 0 || target >= qs.length) return;
    [qs[idx], qs[target]] = [qs[target], qs[idx]];
    setQuestions(qs);
  };

  const handleSave = () => {
    if (!title.trim()) { setErr("Please add a title."); return; }
    if (questions.length === 0) { setErr("Add at least one question."); return; }
    for (let i = 0; i < questions.length; i++) {
      if (!questions[i].text.trim()) { setErr(`Question ${i + 1} has no text.`); return; }
    }
    const saved = {
      title: title.trim(),
      description: description.trim(),
      inApp,
      questions: questions.map(({ id, ...rest }) => rest),
      code: test?.code || generateCode(),
      status: test?.status || "draft",
      createdAt: test?.createdAt || Date.now(),
      updatedAt: Date.now()
    };
    if (test?.id) saved.id = test.id;
    onSave(saved);
  };

  return (
    <>
      <div style={S.topBar}>
        <div>
          <h1 style={S.pageTitle}>{test ? "Edit Test" : "Create Test"}</h1>
          <p style={S.pageSub}>Build your assessment</p>
        </div>
        <div style={{ display: "flex", gap: "0.75rem" }}>
          <button onClick={onCancel} style={{ ...S.btn, ...S.btnGhost }}>Cancel</button>
          <button onClick={handleSave} style={{ ...S.btn, ...S.btnPrimary }}>Save Test</button>
        </div>
      </div>
      {err && <div style={S.error}>{err}</div>}
      <div style={{ ...S.card, marginBottom: "1.5rem" }}>
        <div style={S.fieldGroup}>
          <label style={S.label}>Test Title *</label>
          <input style={S.input} value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Chapter 5 Quiz" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Description / Instructions</label>
          <textarea style={S.textarea} value={description} onChange={e => setDescription(e.target.value)} placeholder="Any instructions for students..." />
        </div>
        <div style={{ display: "flex", gap: "1rem", alignItems: "center" }}>
          <label style={{ display: "flex", alignItems: "center", gap: "0.5rem", cursor: "pointer" }}>
            <input type="checkbox" checked={inApp} onChange={e => setInApp(e.target.checked)} />
            <span style={{ fontSize: "0.9rem" }}>Students complete in-app</span>
          </label>
          <span style={{ color: "var(--muted)", fontSize: "0.85rem" }}>
            {inApp ? "App will grade automatically" : "Print/paper — questions shown on screen, answers on paper"}
          </span>
        </div>
      </div>

      {questions.map((q, idx) => (
        <QuestionEditor key={q.id} q={q} idx={idx} total={questions.length}
          onChange={patch => updateQuestion(idx, patch)}
          onRemove={() => removeQuestion(idx)}
          onMove={dir => moveQuestion(idx, dir)}
          inApp={inApp}
        />
      ))}

      <div style={{ ...S.card, background: "var(--cream)", border: "2px dashed var(--border)" }}>
        <p style={{ marginBottom: "1rem", fontWeight: 600 }}>Add Question</p>
        <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap" }}>
          {[
            { type: "multiple_choice", label: "Multiple Choice", icon: "🔘" },
            { type: "multiple_select", label: "Multiple Select", icon: "☑️" },
            { type: "true_false", label: "True / False", icon: "✅" },
            { type: "short_answer", label: "Short Answer", icon: "📝" },
            { type: "essay", label: "Essay", icon: "📄" },
          ].map(t => (
            <button key={t.type} onClick={() => addQuestion(t.type)}
              style={{ ...S.btn, ...S.btnGhost, fontSize: "0.85rem" }}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

function QuestionEditor({ q, idx, total, onChange, onRemove, onMove, inApp }) {
  const typeLabels = { multiple_choice: "Multiple Choice", multiple_select: "Multiple Select", true_false: "True / False", short_answer: "Short Answer", essay: "Essay" };

  const addOption = () => onChange({ options: [...q.options, ""] });
  const updateOption = (i, val) => onChange({ options: q.options.map((o, j) => j === i ? val : o) });
  const removeOption = (i) => onChange({ options: q.options.filter((_, j) => j !== i), correctAnswers: q.correctAnswers.filter(a => a !== q.options[i]) });
  const toggleCorrect = (opt) => {
    if (q.type === "multiple_choice" || q.type === "true_false") {
      onChange({ correctAnswers: [opt] });
    } else {
      const cur = q.correctAnswers || [];
      onChange({ correctAnswers: cur.includes(opt) ? cur.filter(a => a !== opt) : [...cur, opt] });
    }
  };

  return (
    <div style={S.qCard}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
          <span style={{ ...S.badge, background: "var(--cream)", color: "var(--muted)" }}>Q{idx + 1}</span>
          <span style={{ fontSize: "0.8rem", color: "var(--muted)" }}>{typeLabels[q.type]}</span>
        </div>
        <div style={{ display: "flex", gap: "0.4rem" }}>
          <button onClick={() => onMove(-1)} disabled={idx === 0} style={{ background: "none", border: "none", cursor: "pointer", opacity: idx === 0 ? 0.3 : 1 }}>↑</button>
          <button onClick={() => onMove(1)} disabled={idx === total - 1} style={{ background: "none", border: "none", cursor: "pointer", opacity: idx === total - 1 ? 0.3 : 1 }}>↓</button>
          <button onClick={onRemove} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--danger)" }}>✕</button>
        </div>
      </div>

      <div style={S.fieldGroup}>
        <label style={S.label}>Question Text *</label>
        <textarea style={{ ...S.textarea, minHeight: "70px" }} value={q.text} onChange={e => onChange({ text: e.target.value })} placeholder="Enter your question..." />
      </div>

      <div style={{ display: "flex", gap: "1rem", alignItems: "flex-start", flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: "80px" }}>
          <label style={S.label}>Points</label>
          <input style={{ ...S.input, width: "80px" }} type="number" min="0" value={q.points} onChange={e => onChange({ points: Number(e.target.value) })} />
        </div>
      </div>

      {/* Options for MC/MS/TF */}
      {["multiple_choice", "multiple_select", "true_false"].includes(q.type) && (
        <div style={{ marginTop: "1rem" }}>
          <label style={S.label}>Options {inApp && <span style={{ color: "var(--accent2)" }}>(✓ = correct answer{q.type === "multiple_select" ? "s" : ""})</span>}</label>
          {q.type === "true_false" ? (
            ["True", "False"].map(opt => (
              <div key={opt} style={S.optionRow}>
                {inApp && (
                  <input type="radio" checked={q.correctAnswers?.includes(opt)} onChange={() => toggleCorrect(opt)} />
                )}
                <span style={{ fontSize: "0.95rem" }}>{opt}</span>
              </div>
            ))
          ) : (
            <>
              {q.options.map((opt, i) => (
                <div key={i} style={S.optionRow}>
                  {inApp && (
                    q.type === "multiple_choice"
                      ? <input type="radio" checked={q.correctAnswers?.includes(opt)} onChange={() => toggleCorrect(opt)} />
                      : <input type="checkbox" checked={q.correctAnswers?.includes(opt)} onChange={() => toggleCorrect(opt)} />
                  )}
                  <input style={{ ...S.input, flex: 1 }} value={opt} onChange={e => updateOption(i, e.target.value)} placeholder={`Option ${i + 1}`} />
                  {q.options.length > 2 && <button onClick={() => removeOption(i)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--muted)" }}>✕</button>}
                </div>
              ))}
              <button onClick={addOption} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.4rem 0.8rem", marginTop: "0.5rem" }}>+ Option</button>
            </>
          )}
        </div>
      )}

      {q.type === "short_answer" && inApp && (
        <div style={{ marginTop: "1rem" }}>
          <label style={S.label}>Accepted Answers (comma-separated, case-insensitive)</label>
          <input style={S.input} value={q.correctAnswers?.join(", ") || ""} onChange={e => onChange({ correctAnswers: e.target.value.split(",").map(a => a.trim()).filter(a => a.length > 0) })} placeholder="e.g. Paris, paris" />
        </div>
      )}
    </div>
  );
}

// ─── GRADES VIEW ──────────────────────────────────────────────────────────────
function GradesView({ testId, tests, onBack, onSave, flash }) {
  const [submissions, setSubmissions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [detailIndex, setDetailIndex] = useState(null);
  const test = tests.find(t => t.id === testId);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const data = await apiFetch(`/submissions/test/${testId}`);
      setSubmissions(data.submissions || []);
    } catch (e) { console.error('load submissions', e); }
    setLoading(false);
  }, [testId]);

  useEffect(() => { load(); }, [load]);

  const allowRetake = async (sub) => {
    try {
      await apiFetch(`/submissions/${sub.id}/retake`, { method: 'PATCH' });
      flash(`Retake allowed for ${sub.email}.`);
      await load();
    } catch (e) { flash('Error: ' + e.message); }
  };

  const gradeManually = async (sub, qIdx, score) => {
    try {
      const res = await apiFetch(`/submissions/${sub.id}/grade`, { method: 'PATCH', body: { questionIndex: qIdx, score } });
      setSubmissions(prev => prev.map((s, i) => i === detailIndex ? { ...s, answers: res.answers, totalScore: res.totalScore, percentage: res.percentage } : s));
    } catch (e) { flash('Error saving grade: ' + e.message); }
  };

  if (!test) return <div>Test not found. <button onClick={onBack}>Back</button></div>;

  if (detailIndex !== null) {
    const detail = submissions[detailIndex];
    return (
      <>
        <div style={S.topBar}>
          <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
              <button onClick={() => setDetailIndex(null)} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.3rem 0.7rem" }}>← All Students</button>
              <select
                value={detailIndex}
                onChange={e => setDetailIndex(Number(e.target.value))}
                style={{ ...S.input, padding: "0.35rem 0.75rem", fontSize: "0.9rem", maxWidth: "260px" }}
              >
                {submissions.map((s, i) => (
                  <option key={s.id} value={i}>{s.email} — {s.invalidated ? "Invalidated" : `${s.percentage}%`}</option>
                ))}
              </select>
            </div>
            <p style={S.pageSub}>{test.title} · Submitted {new Date(detail.submittedAt).toLocaleString()}</p>
          </div>
          <div style={{ display: "flex", gap: "0.5rem", alignItems: "center" }}>
            <span style={{ fontSize: "1.5rem", fontFamily: "'DM Serif Display',serif" }}>{detail.percentage}%</span>
            <button
              onClick={() => setDetailIndex(i => Math.max(0, i - 1))}
              disabled={detailIndex === 0}
              style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.3rem 0.7rem", opacity: detailIndex === 0 ? 0.4 : 1 }}
            >← Prev</button>
            <button
              onClick={() => setDetailIndex(i => Math.min(submissions.length - 1, i + 1))}
              disabled={detailIndex === submissions.length - 1}
              style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.3rem 0.7rem", opacity: detailIndex === submissions.length - 1 ? 0.4 : 1 }}
            >Next →</button>
          </div>
        </div>
        <div style={{ marginBottom: "0.75rem", fontSize: "0.85rem", color: "var(--muted)" }}>
          Student {detailIndex + 1} of {submissions.length}
        </div>
        {test.questions.map((q, i) => {
          const ans = detail.answers?.[i];
          const score = ans?.manualScore !== undefined ? ans.manualScore : (ans?.autoScore || 0);
          return (
            <div key={q.id} style={{ ...S.card, marginBottom: "1rem" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "0.5rem" }}>
                <strong>Q{i + 1}: {q.text}</strong>
                <div style={{ display: "flex", gap: "0.5rem", alignItems: "center", fontSize: "0.85rem" }}>
                  <input type="number" min="0" max={q.points} value={score}
                    onChange={e => gradeManually(detail, i, Number(e.target.value))}
                    style={{ width: "50px", ...S.input, padding: "0.3rem 0.5rem" }} />
                  <span style={{ color: "var(--muted)" }}>/ {q.points} pts</span>
                </div>
              </div>
              <div style={{ background: "var(--cream)", padding: "0.75rem", borderRadius: "8px", fontSize: "0.9rem" }}>
                <strong>Answer: </strong>{ans?.value || <em style={{ color: "var(--muted)" }}>No answer</em>}
              </div>
              {q.correctAnswers?.length > 0 && (
                <div style={{ marginTop: "0.5rem", fontSize: "0.85rem", color: "var(--accent2)" }}>
                  ✓ Correct: {Array.isArray(q.correctAnswers) ? q.correctAnswers.join(", ") : q.correctAnswers}
                </div>
              )}
            </div>
          );
        })}
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: "1rem" }}>
          <button onClick={() => allowRetake(detail)} style={{ ...S.btn, background: "#fff3cd", color: "#856404", border: "none", fontSize: "0.85rem", borderRadius: "8px" }}>Allow Retake</button>
          <div style={{ display: "flex", gap: "0.5rem" }}>
            <button onClick={() => setDetailIndex(i => Math.max(0, i - 1))} disabled={detailIndex === 0} style={{ ...S.btn, ...S.btnGhost, opacity: detailIndex === 0 ? 0.4 : 1 }}>← Prev Student</button>
            <button onClick={() => setDetailIndex(i => Math.min(submissions.length - 1, i + 1))} disabled={detailIndex === submissions.length - 1} style={{ ...S.btn, ...S.btnGhost, opacity: detailIndex === submissions.length - 1 ? 0.4 : 1 }}>Next Student →</button>
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <div style={S.topBar}>
        <div>
          <h1 style={S.pageTitle}>{test.title} — Results</h1>
          <p style={S.pageSub}>{submissions.length} submission{submissions.length !== 1 ? "s" : ""}</p>
        </div>
        <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost }}>← Back</button>
      </div>
      {loading && <p>Loading...</p>}
      {!loading && submissions.length === 0 && (
        <div style={{ ...S.card, textAlign: "center", padding: "3rem" }}>
          <p style={{ color: "var(--muted)" }}>No submissions yet</p>
        </div>
      )}
      {submissions.length > 0 && (
        <div style={S.tableWrap}>
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>Student Email</th>
                <th style={S.th}>Score</th>
                <th style={S.th}>Grade</th>
                <th style={S.th}>Submitted</th>
                <th style={S.th}>Status</th>
                <th style={S.th}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {submissions.map((sub, i) => (
                <tr key={sub.id}>
                  <td style={S.td}>{sub.email}</td>
                  <td style={S.td}>{sub.invalidated ? "—" : `${sub.totalScore || 0} / ${sub.totalPoints || 0}`}</td>
                  <td style={S.td}>
                    {sub.invalidated
                      ? <span style={{ ...S.badge, ...S.badgeClosed }}>Invalidated (0)</span>
                      : <span style={{ ...S.badge, ...S.badgeActive }}>{sub.percentage || 0}%</span>
                    }
                  </td>
                  <td style={{ ...S.td, fontSize: "0.85rem", color: "var(--muted)" }}>{new Date(sub.submittedAt).toLocaleString()}</td>
                  <td style={S.td}>
                    {sub.retakeAllowed ? <span style={{ ...S.badge, background: "#fff3cd", color: "#856404" }}>Retake Allowed</span> : ""}
                  </td>
                  <td style={S.td}>
                    <div style={{ display: "flex", gap: "0.4rem" }}>
                      <button onClick={() => setDetailIndex(i)} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.75rem", padding: "0.3rem 0.6rem" }}>View</button>
                      {!sub.invalidated && <button onClick={() => allowRetake(sub)} style={{ ...S.btn, background: "#fff3cd", color: "#856404", border: "none", fontSize: "0.75rem", padding: "0.3rem 0.6rem", borderRadius: "8px" }}>Allow Retake</button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// STUDENT TEST EXPERIENCE
// ═══════════════════════════════════════════════════════════════════════════════
function StudentTest({ test, email, onDone, onInvalidate }) {
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState(Array(test.questions.length).fill(null).map(() => ({ value: null })));
  const [finished, setFinished] = useState(false);
  const [result, setResult] = useState(null);
  const [showDropdown, setShowDropdown] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const invalidatedRef = useRef(false);

  const handleInvalidate = async () => {
    try {
      await apiFetch('/submissions', { method: 'POST', body: { testId: test.id, studentEmail: email, answers: [], invalidated: true } });
    } catch (e) { /* best effort */ }
    onInvalidate();
  };

  // Invalidate on visibility change (tab switch / background)
  useEffect(() => {
    const handleVisibility = () => {
      if (document.hidden && !finished && !invalidatedRef.current) {
        invalidatedRef.current = true;
        handleInvalidate();
      }
    };
    document.addEventListener("visibilitychange", handleVisibility);
    return () => document.removeEventListener("visibilitychange", handleVisibility);
  }, [finished]);

  const setAnswer = (val) => {
    setAnswers(prev => prev.map((a, i) => i === currentQ ? { value: val } : a));
  };

  const toggleMultiSelect = (opt) => {
    const cur = answers[currentQ]?.value || [];
    const next = Array.isArray(cur)
      ? cur.includes(opt) ? cur.filter(o => o !== opt) : [...cur, opt]
      : [opt];
    setAnswer(next);
  };

  const finish = async () => {
    setSubmitting(true);
    setShowConfirm(false);
    // Grade
    const q = test.questions;
    const graded = answers.map((a, i) => {
      const question = q[i];
      let autoScore = 0;
      if (question.type === "multiple_choice" || question.type === "true_false") {
        if (question.correctAnswers?.length > 0 && a.value === question.correctAnswers[0]) autoScore = question.points || 0;
      } else if (question.type === "multiple_select") {
        const correct = new Set(question.correctAnswers || []);
        const given = new Set(Array.isArray(a.value) ? a.value : []);
        if ([...correct].every(c => given.has(c)) && [...given].every(g => correct.has(g))) autoScore = question.points || 0;
      } else if (question.type === "short_answer") {
        const accepted = (question.correctAnswers || []).map(x => x.toLowerCase().trim());
        if (accepted.length > 0 && accepted.includes((a.value || "").toLowerCase().trim())) autoScore = question.points || 0;
      }
      // essay: 0 auto score, teacher grades manually
      return { ...a, autoScore };
    });

    const totalScore = graded.reduce((s, a) => s + (a.autoScore || 0), 0);
    const totalPoints = q.reduce((s, q) => s + (q.points || 0), 0);
    const percentage = totalPoints > 0 ? Math.round((totalScore / totalPoints) * 100) : 0;
    try {
      const res = await apiFetch('/submissions', { method: 'POST', body: { testId: test.id, studentEmail: email, answers: graded } });
      setResult({ totalScore: res.totalScore, totalPoints: res.totalPoints, percentage: res.percentage, graded: res.answers || graded });
    } catch (e) {
      setResult({ totalScore, totalPoints, percentage, graded });
    }
    setFinished(true);
  };

  if (finished && result) {
    const hasEssay = test.questions.some(q => q.type === "essay");
    const allAutoGraded = !hasEssay;

    return (
      <div style={{ ...S.testWrap, justifyContent: "flex-start", paddingTop: "2rem", paddingBottom: "4rem" }}>
        {/* Score header card */}
        <div style={{ ...S.testCard, marginBottom: "1.5rem", maxWidth: "680px", width: "100%" }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", paddingBottom: "1.5rem" }}>
            <div style={{ fontSize: "3rem", marginBottom: "0.75rem" }}>
              {result.percentage >= 90 ? "🏆" : result.percentage >= 70 ? "✅" : result.percentage >= 50 ? "📝" : "😔"}
            </div>
            <h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.8rem", marginBottom: "0.25rem" }}>Test Complete!</h2>
            <p style={{ color: "var(--muted)", fontSize: "0.9rem", marginBottom: "1.5rem" }}>{test.title}</p>

            {allAutoGraded ? (
              <>
                <div style={{ fontSize: "4rem", fontFamily: "'DM Serif Display',serif", lineHeight: 1 }}>{result.percentage}%</div>
                <p style={{ color: "var(--muted)", marginTop: "0.25rem", fontSize: "1rem" }}>
                  {result.totalScore} / {result.totalPoints} points
                </p>
              </>
            ) : (
              <>
                <div style={{ fontSize: "3rem", fontFamily: "'DM Serif Display',serif", lineHeight: 1 }}>
                  {result.percentage}%
                  <span style={{ fontSize: "1rem", color: "var(--muted)", fontFamily: "'DM Sans',sans-serif", marginLeft: "0.5rem" }}>so far</span>
                </div>
                <p style={{ color: "var(--muted)", marginTop: "0.25rem", fontSize: "0.95rem" }}>
                  {result.totalScore} / {result.totalPoints} pts auto-graded
                </p>
                <div style={{ marginTop: "0.75rem", background: "#fff3cd", color: "#856404", borderRadius: "8px", padding: "0.6rem 1rem", fontSize: "0.85rem", textAlign: "center" }}>
                  📋 Essay questions will be graded by your teacher. Your final score may change.
                </div>
              </>
            )}

            {/* Score bar */}
            <div style={{ width: "100%", marginTop: "1.25rem" }}>
              <div style={{ height: "8px", background: "var(--border)", borderRadius: "4px", overflow: "hidden" }}>
                <div style={{
                  height: "100%", borderRadius: "4px", transition: "width 1s ease",
                  width: `${result.percentage}%`,
                  background: result.percentage >= 90 ? "var(--accent2)" : result.percentage >= 70 ? "#5a9e6f" : result.percentage >= 50 ? "var(--gold)" : "var(--accent)"
                }} />
              </div>
            </div>
          </div>

          <hr style={S.divider} />

          {/* Quick stats row */}
          <div style={{ display: "flex", justifyContent: "space-around", textAlign: "center", paddingTop: "0.5rem" }}>
            <div>
              <div style={{ fontSize: "1.4rem", fontFamily: "'DM Serif Display',serif" }}>
                {result.graded.filter((a, i) => test.questions[i].type !== "essay" && a.autoScore === test.questions[i].points && test.questions[i].points > 0).length}
              </div>
              <div style={{ fontSize: "0.75rem", color: "var(--muted)", marginTop: "0.15rem" }}>Correct</div>
            </div>
            <div>
              <div style={{ fontSize: "1.4rem", fontFamily: "'DM Serif Display',serif" }}>
                {result.graded.filter((a, i) => test.questions[i].type !== "essay" && a.autoScore === 0 && test.questions[i].correctAnswers?.length > 0).length}
              </div>
              <div style={{ fontSize: "0.75rem", color: "var(--muted)", marginTop: "0.15rem" }}>Incorrect</div>
            </div>
            {hasEssay && (
              <div>
                <div style={{ fontSize: "1.4rem", fontFamily: "'DM Serif Display',serif" }}>
                  {result.graded.filter((_, i) => test.questions[i].type === "essay").length}
                </div>
                <div style={{ fontSize: "0.75rem", color: "var(--muted)", marginTop: "0.15rem" }}>Pending</div>
              </div>
            )}
            <div>
              <div style={{ fontSize: "1.4rem", fontFamily: "'DM Serif Display',serif" }}>{test.questions.length}</div>
              <div style={{ fontSize: "0.75rem", color: "var(--muted)", marginTop: "0.15rem" }}>Total Qs</div>
            </div>
          </div>
        </div>

        {/* Answer review — one card per question */}
        <div style={{ width: "100%", maxWidth: "680px" }}>
          <h3 style={{ color: "var(--paper)", fontFamily: "'DM Serif Display',serif", fontSize: "1.4rem", marginBottom: "1rem" }}>Answer Review</h3>
          {test.questions.map((q, i) => {
            const ans = result.graded[i];
            const isEssay = q.type === "essay";
            const hasCorrect = q.correctAnswers?.length > 0;
            const isCorrect = !isEssay && hasCorrect && ans.autoScore === q.points;
            const isWrong = !isEssay && hasCorrect && ans.autoScore < q.points;
            const isPending = isEssay;

            const borderColor = isPending ? "#b8860b" : isCorrect ? "#2d6a4f" : isWrong ? "#c84b31" : "var(--border)";
            const bgStripe = isPending ? "rgba(184,134,11,0.06)" : isCorrect ? "rgba(45,106,79,0.06)" : isWrong ? "rgba(200,75,49,0.06)" : "transparent";

            return (
              <div key={q.id} style={{
                background: "var(--paper)", borderRadius: "14px", padding: "1.5rem",
                marginBottom: "1rem", border: `2px solid ${borderColor}`,
                position: "relative", overflow: "hidden"
              }}>
                {/* Color stripe on left */}
                <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: "4px", background: borderColor }} />

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.75rem", paddingLeft: "0.5rem" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "0.6rem" }}>
                    <span style={{ ...S.badge, background: "var(--cream)", color: "var(--muted)" }}>Q{i + 1}</span>
                    <span style={{ fontSize: "0.8rem", color: "var(--muted)" }}>
                      {q.type === "multiple_choice" ? "Multiple Choice" : q.type === "multiple_select" ? "Multiple Select" : q.type === "true_false" ? "True / False" : q.type === "short_answer" ? "Short Answer" : "Essay"}
                    </span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                    {isPending && <span style={{ ...S.badge, background: "#fff3cd", color: "#856404" }}>⏳ Pending</span>}
                    {isCorrect && <span style={{ ...S.badge, background: "#d4edda", color: "#2d6a4f" }}>✓ Correct</span>}
                    {isWrong && <span style={{ ...S.badge, background: "#fde8e4", color: "#c84b31" }}>✗ Incorrect</span>}
                    {!hasCorrect && !isPending && <span style={{ ...S.badge, background: "var(--cream)", color: "var(--muted)" }}>No key set</span>}
                    <span style={{ fontSize: "0.85rem", fontWeight: 600, color: isPending ? "var(--gold)" : isCorrect ? "var(--accent2)" : isWrong ? "var(--accent)" : "var(--muted)" }}>
                      {isPending ? `? / ${q.points}` : `${ans.autoScore} / ${q.points}`} pts
                    </span>
                  </div>
                </div>

                {/* Question text */}
                <p style={{ fontSize: "1rem", lineHeight: 1.5, marginBottom: "1rem", fontWeight: 500, paddingLeft: "0.5rem" }}>{q.text}</p>

                {/* Your answer */}
                <div style={{ paddingLeft: "0.5rem" }}>
                  <p style={{ fontSize: "0.75rem", fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--muted)", marginBottom: "0.4rem" }}>Your Answer</p>

                  {/* For MC/TF/MS — show options with highlighting */}
                  {["multiple_choice", "true_false"].includes(q.type) && (
                    <div>
                      {(q.type === "true_false" ? ["True", "False"] : q.options).map((opt, j) => {
                        const wasSelected = ans.value === opt;
                        const isCorrectOpt = q.correctAnswers?.includes(opt);
                        let optBg = "var(--white)", optBorder = "var(--border)", optColor = "var(--ink)";
                        if (wasSelected && isCorrectOpt) { optBg = "#d4edda"; optBorder = "#2d6a4f"; optColor = "#2d6a4f"; }
                        else if (wasSelected && !isCorrectOpt) { optBg = "#fde8e4"; optBorder = "#c84b31"; optColor = "#c84b31"; }
                        else if (!wasSelected && isCorrectOpt && hasCorrect) { optBg = "#edf7f1"; optBorder = "#2d6a4f"; optColor = "#2d6a4f"; }
                        return (
                          <div key={j} style={{ display: "flex", alignItems: "center", gap: "0.75rem", padding: "0.6rem 0.9rem", border: `1.5px solid ${optBorder}`, borderRadius: "8px", background: optBg, marginBottom: "0.4rem", color: optColor, fontSize: "0.9rem" }}>
                            <span style={{ fontWeight: 600, opacity: 0.6, minWidth: "16px" }}>{String.fromCharCode(65 + j)}.</span>
                            <span style={{ flex: 1 }}>{opt}</span>
                            {wasSelected && isCorrectOpt && <span>✓</span>}
                            {wasSelected && !isCorrectOpt && <span>✗</span>}
                            {!wasSelected && isCorrectOpt && hasCorrect && <span style={{ fontSize: "0.75rem" }}>← correct</span>}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {q.type === "multiple_select" && (
                    <div>
                      {q.options.map((opt, j) => {
                        const wasSelected = Array.isArray(ans.value) && ans.value.includes(opt);
                        const isCorrectOpt = q.correctAnswers?.includes(opt);
                        let optBg = "var(--white)", optBorder = "var(--border)", optColor = "var(--ink)";
                        if (wasSelected && isCorrectOpt) { optBg = "#d4edda"; optBorder = "#2d6a4f"; optColor = "#2d6a4f"; }
                        else if (wasSelected && !isCorrectOpt) { optBg = "#fde8e4"; optBorder = "#c84b31"; optColor = "#c84b31"; }
                        else if (!wasSelected && isCorrectOpt && hasCorrect) { optBg = "#edf7f1"; optBorder = "#2d6a4f"; optColor = "#2d6a4f"; }
                        return (
                          <div key={j} style={{ display: "flex", alignItems: "center", gap: "0.75rem", padding: "0.6rem 0.9rem", border: `1.5px solid ${optBorder}`, borderRadius: "8px", background: optBg, marginBottom: "0.4rem", color: optColor, fontSize: "0.9rem" }}>
                            <span>{wasSelected ? "☑" : "☐"}</span>
                            <span style={{ flex: 1 }}>{opt}</span>
                            {wasSelected && isCorrectOpt && <span>✓</span>}
                            {wasSelected && !isCorrectOpt && <span>✗</span>}
                            {!wasSelected && isCorrectOpt && hasCorrect && <span style={{ fontSize: "0.75rem" }}>← should select</span>}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {(q.type === "short_answer" || q.type === "essay") && (
                    <div style={{ background: isWrong ? "#fde8e4" : isPending ? "#fffbeb" : isCorrect ? "#edf7f1" : "var(--cream)", border: `1.5px solid ${borderColor}`, borderRadius: "8px", padding: "0.75rem 1rem", fontSize: "0.9rem", color: "var(--ink)", lineHeight: 1.6 }}>
                      {ans.value || <em style={{ color: "var(--muted)" }}>No answer provided</em>}
                    </div>
                  )}

                  {/* Show correct answer for short_answer if wrong */}
                  {q.type === "short_answer" && isWrong && hasCorrect && (
                    <div style={{ marginTop: "0.5rem", display: "flex", alignItems: "center", gap: "0.5rem" }}>
                      <span style={{ fontSize: "0.8rem", color: "var(--accent2)", fontWeight: 600 }}>✓ Accepted:</span>
                      <span style={{ fontSize: "0.85rem", color: "var(--accent2)" }}>{q.correctAnswers.join(", ")}</span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}

          {/* Done button */}
          <div style={{ textAlign: "center", marginTop: "1.5rem" }}>
            <p style={{ color: "rgba(247,244,239,0.5)", fontSize: "0.85rem", marginBottom: "1rem" }}>
              Your results have been saved and your teacher has been notified.
            </p>
            <button onClick={onDone} style={{ ...S.btn, background: "var(--paper)", color: "var(--ink)", padding: "0.85rem 2.5rem", fontSize: "1rem" }}>
              Done
            </button>
          </div>
        </div>
      </div>
    );
  }

  const q = test.questions[currentQ];
  const ans = answers[currentQ];
  const progress = ((currentQ + 1) / test.questions.length) * 100;
  const answeredCount = answers.filter(a => a.value !== null && a.value !== undefined && a.value !== "").length;

  return (
    <div style={S.testWrap}>
      {/* Confirmation Modal */}
      {showConfirm && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: "1rem" }}>
          <div style={{ background: "var(--paper)", borderRadius: "16px", padding: "2rem", maxWidth: "380px", width: "100%", textAlign: "center", boxShadow: "0 40px 80px rgba(0,0,0,0.5)" }}>
            <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>📋</div>
            <h3 style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.5rem", marginBottom: "0.5rem" }}>Submit Test?</h3>
            <p style={{ color: "var(--muted)", fontSize: "0.9rem", marginBottom: "0.75rem", lineHeight: 1.5 }}>
              You answered {answeredCount} of {test.questions.length} questions.
            </p>
            {answeredCount < test.questions.length && (
              <div style={{ background: "#fff3cd", color: "#856404", borderRadius: "8px", padding: "0.6rem 0.9rem", fontSize: "0.85rem", marginBottom: "1rem" }}>
                ⚠️ {test.questions.length - answeredCount} question{test.questions.length - answeredCount !== 1 ? "s" : ""} left unanswered
              </div>
            )}
            <p style={{ color: "var(--muted)", fontSize: "0.85rem", marginBottom: "1.5rem" }}>You cannot go back after submitting.</p>
            <div style={{ display: "flex", gap: "0.75rem", justifyContent: "center" }}>
              <button onClick={() => setShowConfirm(false)} style={{ ...S.btn, ...S.btnGhost, flex: 1 }}>Go Back</button>
              <button onClick={finish} style={{ ...S.btn, ...S.btnSuccess, flex: 1 }}>Submit Now</button>
            </div>
          </div>
        </div>
      )}
      <div style={S.testCard}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
          <span style={{ fontSize: "0.85rem", color: "var(--muted)" }}>{test.title}</span>
          <span style={{ fontSize: "0.8rem", color: "var(--muted)" }}>{email}</span>
        </div>
        <div style={S.progressBar}>
          <div style={{ ...S.progressFill, width: `${progress}%` }} />
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>
          <span style={S.questionNum}>Question {currentQ + 1} of {test.questions.length}</span>
          <div style={{ position: "relative" }}>
            <button onClick={() => setShowDropdown(!showDropdown)}
              onBlur={() => setTimeout(() => setShowDropdown(false), 150)}
              style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.35rem 0.75rem" }}>
              Go to ▾
            </button>
            {showDropdown && (
              <div style={{ position: "absolute", right: 0, top: "calc(100% + 4px)", background: "var(--white)", border: "1.5px solid var(--border)", borderRadius: "8px", zIndex: 100, minWidth: "160px", boxShadow: "0 8px 24px rgba(0,0,0,0.1)", maxHeight: "200px", overflowY: "auto" }}>
                {test.questions.map((qq, i) => (
                  <div key={i} onClick={() => { setCurrentQ(i); setShowDropdown(false); }}
                    style={{ padding: "0.6rem 1rem", cursor: "pointer", fontSize: "0.85rem", background: i === currentQ ? "var(--cream)" : "transparent", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span>Q{i + 1}</span>
                    {answers[i]?.value !== null && answers[i]?.value !== undefined && answers[i]?.value !== "" && (
                      <span style={{ color: "var(--accent2)", fontSize: "0.7rem" }}>✓</span>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <p style={{ fontSize: "0.75rem", color: "var(--muted)", marginBottom: "0.5rem" }}>
          {q.type === "multiple_choice" ? "Select one" : q.type === "multiple_select" ? "Select all that apply" : q.type === "true_false" ? "True or False" : q.type === "short_answer" ? "Short answer" : "Essay"}
          {" · "}{q.points} pt{q.points !== 1 ? "s" : ""}
        </p>
        <p style={S.questionText}>{q.text}</p>

        {/* Answer input by type */}
        {["multiple_choice", "true_false"].includes(q.type) && (
          <div>
            {(q.type === "true_false" ? ["True", "False"] : q.options).map((opt, i) => (
              <button key={i} onClick={() => setAnswer(opt)}
                style={{ ...S.optionBtn, ...(ans.value === opt ? S.optionBtnSelected : {}) }}>
                <span style={{ marginRight: "0.75rem", fontWeight: 600, opacity: 0.5 }}>{String.fromCharCode(65 + i)}.</span>{opt}
              </button>
            ))}
          </div>
        )}
        {q.type === "multiple_select" && (
          <div>
            {q.options.map((opt, i) => {
              const selected = Array.isArray(ans.value) && ans.value.includes(opt);
              return (
                <button key={i} onClick={() => toggleMultiSelect(opt)}
                  style={{ ...S.optionBtn, ...(selected ? S.optionBtnSelected : {}) }}>
                  <span style={{ marginRight: "0.75rem" }}>{selected ? "☑" : "☐"}</span>{opt}
                </button>
              );
            })}
          </div>
        )}
        {q.type === "short_answer" && (
          <input style={S.input} value={ans.value || ""} onChange={e => setAnswer(e.target.value)} placeholder="Your answer..." />
        )}
        {q.type === "essay" && (
          <textarea style={{ ...S.textarea, minHeight: "140px" }} value={ans.value || ""} onChange={e => setAnswer(e.target.value)} placeholder="Write your answer here..." />
        )}

        <div style={S.navRow}>
          <button onClick={() => setCurrentQ(q => q - 1)} disabled={currentQ === 0}
            style={{ ...S.btn, ...S.btnGhost, opacity: currentQ === 0 ? 0.4 : 1 }}>← Previous</button>
          {currentQ < test.questions.length - 1 ? (
            <button onClick={() => setCurrentQ(q => q + 1)} style={{ ...S.btn, ...S.btnPrimary }}>Next →</button>
          ) : (
            <button onClick={() => setShowConfirm(true)} disabled={submitting} style={{ ...S.btn, ...S.btnSuccess }}>
              {submitting ? "Submitting..." : "✓ Finish Test"}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

              <button onClick={() => toggleStatus(deck)} style={{ ...S.btn, background: deck.status === "active" ? "#fde8e4" : "#d4edda", color: deck.status === "active" ? "#c84b31" : "#2d6a4f", border: "none", fontSize: "0.8rem", padding: "0.4rem 0.8rem", borderRadius: "8px" }}>
                {deck.status === "active" ? "Deactivate" : "Activate"}

              <button onClick={() => onDelete(deck.id)} style={{ background: "none", border: "none", color: "var(--danger)", fontSize: "0.8rem", padding: "0.4rem 0.8rem", borderRadius: "8px", cursor: "pointer" }}>🗑</button>

// DECK BUILDER (Teacher)
// ═══════════════════════════════════════════════════════════════════════════════
function DeckBuilder({ deck, onSave, onCancel }) {
  const [title, setTitle] = useState(deck?.title || "");
  const [description, setDescription] = useState(deck?.description || "");
  const [cards, setCards] = useState(deck?.cards || [{ id: generateId(), front: "", back: "", hint: "" }]);
  const [err, setErr] = useState("");

  const addCard = () => setCards(prev => [...prev, { id: generateId(), front: "", back: "", hint: "" }]);
  const updateCard = (idx, patch) => setCards(prev => prev.map((c, i) => i === idx ? { ...c, ...patch } : c));
  const removeCard = (idx) => { if (cards.length === 1) return; setCards(prev => prev.filter((_, i) => i !== idx)); };
  const moveCard = (idx, dir) => {
    const cs = [...cards]; const t = idx + dir;
    if (t < 0 || t >= cs.length) return;
    [cs[idx], cs[t]] = [cs[t], cs[idx]]; setCards(cs);
  };
  const handleSave = () => {
    if (!title.trim()) { setErr("Please add a title."); return; }
    for (let i = 0; i < cards.length; i++) {
      if (!cards[i].front.trim() || !cards[i].back.trim()) { setErr("Card " + (i+1) + " needs both a front and back."); return; }
    }
    const deckData = { title: title.trim(), description: description.trim(), cards: cards.map(({ id, ...rest }) => rest), code: deck?.code || generateCode(), status: deck?.status || "inactive", createdAt: deck?.createdAt || Date.now(), updatedAt: Date.now() };
    if (deck?.id) deckData.id = deck.id;
    onSave(deckData);
  };

  return (
    <>
      <div style={S.topBar}>
        <div>
          <h1 style={S.pageTitle}>{deck ? "Edit Deck" : "Create Flashcard Deck"}</h1>
          <p style={S.pageSub}>Build your study set — {cards.length} card{cards.length !== 1 ? "s" : ""}</p>
        </div>
        <div style={{ display: "flex", gap: "0.75rem" }}>
          <button onClick={onCancel} style={{ ...S.btn, ...S.btnGhost }}>Cancel</button>
          <button onClick={handleSave} style={{ ...S.btn, ...S.btnPrimary }}>Save Deck</button>
        </div>
      </div>
      {err && <div style={S.error}>{err}</div>}
      <div style={{ ...S.card, marginBottom: "1.5rem" }}>
        <div style={S.fieldGroup}>
          <label style={S.label}>Deck Title *</label>
          <input style={S.input} value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Chapter 5 Vocabulary" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Description (optional)</label>
          <input style={S.input} value={description} onChange={e => setDescription(e.target.value)} placeholder="What is this deck for?" />
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
        <h3 style={{ fontFamily: "'DM Serif Display',serif" }}>{cards.length} Card{cards.length !== 1 ? "s" : ""}</h3>
        <button onClick={addCard} style={{ ...S.btn, ...S.btnSuccess, fontSize: "0.85rem", padding: "0.5rem 1rem" }}>+ Add Card</button>
      </div>
      {cards.map((card, idx) => (
        <div key={card.id} style={{ ...S.card, marginBottom: "0.75rem", borderLeft: "4px solid #2d6a4f" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
            <span style={{ ...S.badge, background: "#d4edda", color: "#2d6a4f" }}>Card {idx + 1}</span>
            <div style={{ display: "flex", gap: "0.4rem" }}>
              <button onClick={() => moveCard(idx, -1)} disabled={idx === 0} style={{ background: "none", border: "none", cursor: "pointer", opacity: idx === 0 ? 0.3 : 1, fontSize: "1rem" }}>↑</button>
              <button onClick={() => moveCard(idx, 1)} disabled={idx === cards.length - 1} style={{ background: "none", border: "none", cursor: "pointer", opacity: idx === cards.length - 1 ? 0.3 : 1, fontSize: "1rem" }}>↓</button>
              <button onClick={() => removeCard(idx)} disabled={cards.length === 1} style={{ background: "none", border: "none", cursor: "pointer", color: cards.length === 1 ? "var(--border)" : "var(--danger)", fontSize: "1rem" }}>✕</button>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1rem" }}>
            <div>
              <label style={S.label}>Front (Question / Term) *</label>
              <textarea style={{ ...S.textarea, minHeight: "80px" }} value={card.front} onChange={e => updateCard(idx, { front: e.target.value })} placeholder="What appears on the front?" />
            </div>
            <div>
              <label style={S.label}>Back (Answer / Definition) *</label>
              <textarea style={{ ...S.textarea, minHeight: "80px" }} value={card.back} onChange={e => updateCard(idx, { back: e.target.value })} placeholder="What appears on the back?" />
            </div>
          </div>
          <div style={{ marginTop: "0.75rem" }}>
            <label style={S.label}>Hint (optional)</label>
            <input style={S.input} value={card.hint || ""} onChange={e => updateCard(idx, { hint: e.target.value })} placeholder="Optional hint to help students remember..." />
          </div>
        </div>
      ))}
      <div style={{ textAlign: "center", marginTop: "1.5rem" }}>
        <button onClick={addCard} style={{ ...S.btn, ...S.btnGhost }}>+ Add Another Card</button>
      </div>
    </>
  );
}

// FLASHCARD STUDENT LOGIN
// ═══════════════════════════════════════════════════════════════════════════════
function FlashcardLogin({ onEnter, onBack }) {
  const [email, setEmail] = useState("");
  const [code, setCode] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const handleEnter = async () => {
    if (!email.trim() || !code.trim()) { setErr("Please fill in both fields."); return; }
    if (!/\S+@\S+\.\S+/.test(email)) { setErr("Please enter a valid email."); return; }
    setLoading(true); setErr("");
    let foundDeck = null;
    try {
      const data = await apiFetch('/decks/by-code/' + code.toUpperCase());
      foundDeck = data.deck;
    } catch (e) {
      setErr("Invalid or inactive deck code."); setLoading(false); return;
    }
    setLoading(false);
    onEnter({ deck: foundDeck, email: email.toLowerCase() });
  };

  return (
    <div style={S.authWrap}>
      <div style={S.authBox}>
        <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", marginBottom: "1.5rem" }}>← Back</button>
        <div style={{ fontSize: "2.5rem", marginBottom: "0.5rem" }}>🃏</div>
        <h2 style={S.authTitle}>Flashcard Study</h2>
        <p style={S.authSub}>Enter your deck code to start studying</p>
        {err && <div style={S.error}>{err}</div>}
        <div style={S.fieldGroup}>
          <label style={S.label}>Your Email</label>
          <input style={S.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="student@school.edu" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Deck Code</label>
          <input type="text" value={code} onChange={e => setCode(e.target.value.toUpperCase())} onKeyDown={e => e.key === "Enter" && handleEnter()} placeholder="ABC123" maxLength={8} style={{ ...S.input, letterSpacing: "0.2em", textTransform: "uppercase" }} />
        </div>
        <button onClick={handleEnter} disabled={loading} style={{ ...S.btn, ...S.btnSuccess, width: "100%" }}>
          {loading ? "Loading..." : "Start Studying →"}
        </button>
      </div>
    </div>
  );
}
