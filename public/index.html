// ─── Utility ────────────────────────────────────────────────────────────────
const generateCode = () => Math.random().toString(36).substring(2, 8).toUpperCase();
const generateId = () => Math.random().toString(36).substring(2, 12);

// ─── Storage helpers ─────────────────────────────────────────────────────────
// ─── API Client ──────────────────────────────────────────────────────────────
const API_BASE = window.QT_API_BASE || '/api';

// ─── MOCK BACKEND (activates automatically when no server is reachable) ───────
const _mockDB = {
  get: (key, def) => { try { return JSON.parse(localStorage.getItem('qt_mock_' + key)) ?? def; } catch { return def; } },
  set: (key, val) => { localStorage.setItem('qt_mock_' + key, JSON.stringify(val)); return val; },
};

function _mockHandler(path, options) {
  const method = (options.method || 'GET').toUpperCase();
  const body = options.body || {};
  const token = localStorage.getItem('qt_token');

  // Decode current teacher from token
  const getCurrentTeacher = () => {
    if (!token) return null;
    try { return JSON.parse(atob(token.split('.')[1])); } catch { return null; }
  };
  const makeToken = (teacher) => {
    const payload = btoa(JSON.stringify({ id: teacher.id, email: teacher.email, name: teacher.name }));
    return `mock.${payload}.sig`;
  };

  // ── Auth ──
  if (path === '/auth/register' && method === 'POST') {
    const teachers = _mockDB.get('teachers', []);
    if (teachers.find(t => t.email === body.email)) throw new Error('Email already registered.');
    const teacher = { id: generateId(), name: body.name, email: body.email, password: body.password };
    _mockDB.set('teachers', [...teachers, teacher]);
    return { token: makeToken(teacher), teacher: { id: teacher.id, name: teacher.name, email: teacher.email } };
  }
  if (path === '/auth/login' && method === 'POST') {
    const teachers = _mockDB.get('teachers', []);
    const teacher = teachers.find(t => t.email === body.email && t.password === body.password);
    if (!teacher) throw new Error('Invalid email or password.');
    return { token: makeToken(teacher), teacher: { id: teacher.id, name: teacher.name, email: teacher.email } };
  }
  if (path === '/auth/me' && method === 'GET') {
    const me = getCurrentTeacher();
    if (!me) throw new Error('Unauthorized');
    return { teacher: me };
  }
  if (path === '/auth/forgot-password' && method === 'POST') {
    // In mock mode just silently succeed — no email can be sent
    return { ok: true };
  }
  if (path === '/auth/reset-password' && method === 'POST') {
    throw new Error('Password reset requires a live server. In demo mode, please register a new account.');
  }

  // ── Tests ──
  const me = getCurrentTeacher();
  const teacherId = me?.id || 'demo';

  if (path === '/tests' && method === 'GET') {
    const tests = _mockDB.get(`tests_${teacherId}`, []);
    return { tests };
  }
  if (path === '/tests' && method === 'POST') {
    const tests = _mockDB.get(`tests_${teacherId}`, []);
    const test = { ...body, id: generateId(), createdAt: Date.now(), updatedAt: Date.now() };
    _mockDB.set(`tests_${teacherId}`, [test, ...tests]);
    return { test };
  }
  const testEditMatch = path.match(/^\/tests\/([^/]+)$/);
  if (testEditMatch && method === 'PUT') {
    const id = testEditMatch[1];
    const tests = _mockDB.get(`tests_${teacherId}`, []);
    const test = { ...body, id, updatedAt: Date.now() };
    _mockDB.set(`tests_${teacherId}`, tests.map(t => t.id === id ? test : t));
    return { test };
  }
  if (testEditMatch && method === 'DELETE') {
    const id = testEditMatch[1];
    const tests = _mockDB.get(`tests_${teacherId}`, []);
    _mockDB.set(`tests_${teacherId}`, tests.filter(t => t.id !== id));
    return { ok: true };
  }
  const byCodeMatch = path.match(/^\/tests\/by-code\/([^/]+)$/);
  if (byCodeMatch && method === 'GET') {
    const code = byCodeMatch[1];
    // Search all teachers' tests
    const allKeys = Object.keys(localStorage).filter(k => k.startsWith('qt_mock_tests_'));
    for (const key of allKeys) {
      try {
        const tests = JSON.parse(localStorage.getItem(key)) || [];
        const test = tests.find(t => t.code === code && t.status === 'active');
        if (test) return { test };
      } catch {}
    }
    throw new Error('Invalid or inactive test code.');
  }

  // ── Decks ──
  if (path === '/decks' && method === 'GET') {
    return { decks: _mockDB.get(`decks_${teacherId}`, []) };
  }
  if (path === '/decks' && method === 'POST') {
    const decks = _mockDB.get(`decks_${teacherId}`, []);
    const deck = { ...body, id: generateId(), createdAt: Date.now(), updatedAt: Date.now() };
    _mockDB.set(`decks_${teacherId}`, [deck, ...decks]);
    return { deck };
  }
  const deckEditMatch = path.match(/^\/decks\/([^/]+)$/);
  if (deckEditMatch && method === 'PUT') {
    const id = deckEditMatch[1];
    const decks = _mockDB.get(`decks_${teacherId}`, []);
    const deck = { ...body, id, updatedAt: Date.now() };
    _mockDB.set(`decks_${teacherId}`, decks.map(d => d.id === id ? deck : d));
    return { deck };
  }
  if (deckEditMatch && method === 'DELETE') {
    const id = deckEditMatch[1];
    _mockDB.set(`decks_${teacherId}`, _mockDB.get(`decks_${teacherId}`, []).filter(d => d.id !== id));
    return { ok: true };
  }
  const deckByCodeMatch = path.match(/^\/decks\/by-code\/([^/]+)$/);
  if (deckByCodeMatch && method === 'GET') {
    const code = deckByCodeMatch[1];
    const allKeys = Object.keys(localStorage).filter(k => k.startsWith('qt_mock_decks_'));
    for (const key of allKeys) {
      try {
        const decks = JSON.parse(localStorage.getItem(key)) || [];
        const deck = decks.find(d => d.code === code && d.status === 'active');
        if (deck) return { deck };
      } catch {}
    }
    throw new Error('Invalid or inactive deck code.');
  }

  // ── Submissions ──
  if (path === '/submissions' && method === 'POST') {
    const subs = _mockDB.get('submissions', []);
    // Invalidation submission
    if (body.invalidated) {
      const sub = { id: generateId(), testId: body.testId, email: body.studentEmail, answers: [], totalScore: 0, totalPoints: 0, percentage: 0, invalidated: true, submittedAt: Date.now() };
      _mockDB.set('submissions', [...subs, sub]);
      return sub;
    }
    // Find the test to get totalPoints
    const allTestKeys = Object.keys(localStorage).filter(k => k.startsWith('qt_mock_tests_'));
    let foundTest = null;
    for (const key of allTestKeys) {
      try { const tests = JSON.parse(localStorage.getItem(key)) || []; foundTest = tests.find(t => t.id === body.testId); if (foundTest) break; } catch {}
    }
    const totalPoints = foundTest ? foundTest.questions.reduce((s, q) => s + (q.points || 0), 0) : 0;
    const totalScore = (body.answers || []).reduce((s, a) => s + (a.autoScore || 0), 0);
    const percentage = totalPoints > 0 ? Math.round((totalScore / totalPoints) * 100) : 0;
    const sub = { id: generateId(), testId: body.testId, email: body.studentEmail, answers: body.answers || [], totalScore, totalPoints, percentage, invalidated: false, submittedAt: Date.now() };
    _mockDB.set('submissions', [...subs, sub]);
    return { totalScore, totalPoints, percentage, answers: sub.answers };
  }
  const subTestMatch = path.match(/^\/submissions\/test\/([^/]+)$/);
  if (subTestMatch && method === 'GET') {
    const testId = subTestMatch[1];
    const subs = _mockDB.get('submissions', []).filter(s => s.testId === testId);
    return { submissions: subs };
  }
  const subCheckMatch = path.match(/^\/submissions\/check/);
  if (subCheckMatch && method === 'GET') {
    const params = new URLSearchParams(path.split('?')[1] || '');
    const testId = params.get('testId');
    const email = params.get('email');
    const subs = _mockDB.get('submissions', []);
    const existing = subs.find(s => s.testId === testId && s.email === email);
    return { exists: !!existing, retakeAllowed: existing?.retakeAllowed || false };
  }
  const retakeMatch = path.match(/^\/submissions\/([^/]+)\/retake$/);
  if (retakeMatch && method === 'PATCH') {
    const id = retakeMatch[1];
    const subs = _mockDB.get('submissions', []);
    _mockDB.set('submissions', subs.map(s => s.id === id ? { ...s, retakeAllowed: true } : s));
    return { ok: true };
  }
  const gradeMatch = path.match(/^\/submissions\/([^/]+)\/grade$/);
  if (gradeMatch && method === 'PATCH') {
    const id = gradeMatch[1];
    const subs = _mockDB.get('submissions', []);
    const sub = subs.find(s => s.id === id);
    if (!sub) throw new Error('Submission not found');
    const answers = [...(sub.answers || [])];
    answers[body.questionIndex] = { ...answers[body.questionIndex], manualScore: body.score };
    const totalScore = answers.reduce((s, a) => s + (a.manualScore !== undefined ? a.manualScore : (a.autoScore || 0)), 0);
    const percentage = sub.totalPoints > 0 ? Math.round((totalScore / sub.totalPoints) * 100) : 0;
    const updated = { ...sub, answers, totalScore, percentage };
    _mockDB.set('submissions', subs.map(s => s.id === id ? updated : s));
    return { answers, totalScore, percentage };
  }

  throw new Error(`Mock: unhandled ${method} ${path}`);
}

// Track if we've confirmed the server is unreachable to skip retrying every call
let _mockMode = null; // null = unknown, true = mock, false = real server

async function apiFetch(path, options = {}) {
  // If we already confirmed server is live, go straight to real fetch
  if (_mockMode === false) {
    return _realFetch(path, options);
  }
  // If we already confirmed mock mode, use mock directly
  if (_mockMode === true) {
    return new Promise((resolve, reject) => {
      setTimeout(() => {
        try { resolve(_mockHandler(path, options)); }
        catch (e) { reject(e); }
      }, 60); // small delay to feel realistic
    });
  }
  // Unknown — try real server first
  try {
    const result = await _realFetch(path, options);
    _mockMode = false; // server responded — stay in real mode
    return result;
  } catch (e) {
    // If it's a network error (no server), switch to mock mode permanently
    if (e instanceof TypeError && (e.message.includes('fetch') || e.message.includes('timeout') || e.message.includes('abort') || e.message.includes('Failed'))) {
      _mockMode = true;
      console.info('[QuickTest] No server detected — running in demo mode with localStorage.');
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          try { resolve(_mockHandler(path, options)); }
          catch (me) { reject(me); }
        }, 60);
      });
    }
    throw e; // Real HTTP error (4xx/5xx) — pass through as normal
  }
}

async function _realFetch(path, options = {}) {
  const token = localStorage.getItem('qt_token');
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 3000);
  try {
    const res = await fetch(API_BASE + path, {
      ...options,
      signal: controller.signal,
      headers: {
        'Content-Type': 'application/json',
        ...(token ? { Authorization: 'Bearer ' + token } : {}),
        ...(options.headers || {})
      },
      body: options.body ? JSON.stringify(options.body) : undefined
    });
    clearTimeout(timer);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new TypeError('fetch timeout');
    throw e;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// TEACHER LOGIN
// ═══════════════════════════════════════════════════════════════════════════════
function TeacherLogin({ onLogin, onBack, onRegister, onForgotPassword }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");

  const [loading, setLoading] = useState(false);
  const handleLogin = async () => {
    if (!email.trim() || !password.trim()) { setErr("Please fill in both fields."); return; }
    setLoading(true); setErr("");
    try {
      const data = await apiFetch('/auth/login', { method: 'POST', body: { email, password } });
      localStorage.setItem('qt_token', data.token);
      onLogin(data.teacher);
    } catch (err) {
      setErr(err.message || "Invalid email or password.");
    } finally { setLoading(false); }
  };

  return (
    <div style={S.authWrap}>
      <div style={S.authBox}>
        <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", marginBottom: "1.5rem" }}>← Back</button>
        <h2 style={S.authTitle}>Teacher Login</h2>
        <p style={S.authSub}>Sign in to manage your tests</p>
        {err && <div style={S.error}>{err}</div>}
        <div style={S.fieldGroup}>
          <label style={S.label}>Email</label>
          <input style={S.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="teacher@school.edu" />
        </div>
        <div style={S.fieldGroup}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.4rem" }}>
            <label style={S.label}>Password</label>
            <button
              type="button"
              onClick={onForgotPassword}
              style={{ background: "none", border: "none", color: "var(--accent)", fontSize: "0.8rem", cursor: "pointer", fontWeight: 600, padding: 0 }}
            >
              Forgot password?
            </button>
          </div>
          <input style={S.input} type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="••••••••" />
        </div>
        <button onClick={handleLogin} disabled={loading} style={{ ...S.btn, ...S.btnPrimary, width: "100%" }}>{loading ? "Signing in..." : "Sign In"}</button>
        <div style={{ textAlign: "center", marginTop: "1.25rem" }}>
          <span style={{ fontSize: "0.85rem", color: "var(--muted)" }}>No account? </span>
          <button onClick={onRegister} style={{ background: "none", border: "none", color: "var(--ink)", fontSize: "0.85rem", fontWeight: 600, cursor: "pointer", textDecoration: "underline" }}>Create teacher account</button>
        </div>
      </div>
    </div>
  );
}


// ═══════════════════════════════════════════════════════════════════════════════
// TEACHER REGISTER
// ═══════════════════════════════════════════════════════════════════════════════
function TeacherRegister({ onLogin, onBack, onForgotPassword }) {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const handleRegister = async () => {
    if (!name.trim() || !email.trim() || !password.trim()) { setErr("All fields are required."); return; }
    if (password !== confirm) { setErr("Passwords do not match."); return; }
    if (password.length < 8) { setErr("Password must be at least 8 characters."); return; }
    setLoading(true); setErr("");
    try {
      const data = await apiFetch('/auth/register', { method: 'POST', body: { name, email, password } });
      localStorage.setItem('qt_token', data.token);
      onLogin(data.teacher);
    } catch (err) {
      setErr(err.message || "Registration failed.");
    } finally { setLoading(false); }
  };

  return (
    <div style={S.authWrap}>
      <div style={S.authBox}>
        <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", marginBottom: "1.5rem" }}>← Back</button>
        <h2 style={S.authTitle}>Create Account</h2>
        <p style={S.authSub}>Register as a teacher to get started</p>
        {err && <div style={S.error}>{err}</div>}
        <div style={S.fieldGroup}>
          <label style={S.label}>Your Name</label>
          <input style={S.input} value={name} onChange={e => setName(e.target.value)} placeholder="Ms. Johnson" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Email</label>
          <input style={S.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="teacher@school.edu" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Password</label>
          <input style={S.input} type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Min. 8 characters" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Confirm Password</label>
          <input style={S.input} type="password" value={confirm} onChange={e => setConfirm(e.target.value)} onKeyDown={e => e.key === "Enter" && handleRegister()} placeholder="Re-enter password" />
        </div>
        <button onClick={handleRegister} disabled={loading} style={{ ...S.btn, ...S.btnPrimary, width: "100%" }}>
          {loading ? "Creating account..." : "Create Account"}
        </button>
        <div style={{ textAlign: "center", marginTop: "1.25rem" }}>
          <span style={{ fontSize: "0.85rem", color: "var(--muted)" }}>Already have an account? </span>
          <button onClick={onBack} style={{ background: "none", border: "none", color: "var(--ink)", fontSize: "0.85rem", fontWeight: 600, cursor: "pointer", textDecoration: "underline" }}>Sign in</button>
          <span style={{ fontSize: "0.85rem", color: "var(--muted)" }}> · </span>
          <button onClick={onForgotPassword} style={{ background: "none", border: "none", color: "var(--accent)", fontSize: "0.85rem", fontWeight: 600, cursor: "pointer" }}>Forgot password?</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// STUDENT LOGIN
// ═══════════════════════════════════════════════════════════════════════════════
function StudentLogin({ onEnter, onBack }) {
  const [email, setEmail] = useState("");
  const [code, setCode] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const handleEnter = async () => {
    if (!email.trim() || !code.trim()) { setErr("Please fill in both fields."); return; }
    if (!/\S+@\S+\.\S+/.test(email)) { setErr("Please enter a valid email."); return; }
    setLoading(true);
    setErr("");
    let foundTest = null;
    try {
      const data = await apiFetch('/tests/by-code/' + code.toUpperCase());
      foundTest = data.test;
    } catch (e) {
      setErr("Invalid or inactive test code."); setLoading(false); return;
    }
    // check if student already submitted
    try {
      const chk = await apiFetch(`/submissions/check?testId=${foundTest.id}&email=${encodeURIComponent(email.toLowerCase())}`);
      if (chk.exists && !chk.retakeAllowed) {
        setErr("You have already taken this test. Contact your teacher to retake.");
        setLoading(false); return;
      }
    } catch (e) { /* no submission yet, fine */ }
    setLoading(false);
    onEnter({ test: foundTest, email: email.toLowerCase() });
  };

  return (
    <div style={S.authWrap}>
      <div style={S.authBox}>
        <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", marginBottom: "1.5rem" }}>← Back</button>
        <h2 style={S.authTitle}>Student Portal</h2>
        <p style={S.authSub}>Enter your details to access your test</p>
        {err && <div style={S.error}>{err}</div>}
        <div style={S.fieldGroup}>
          <label style={S.label}>Your Email</label>
          <input style={S.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="student@school.edu" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Test Code</label>
          <input type="text" value={code} onChange={e => setCode(e.target.value.toUpperCase())} onKeyDown={e => e.key === "Enter" && handleEnter()} placeholder="ABC123" maxLength={8} style={{ ...S.input, letterSpacing: "0.2em", textTransform: "uppercase" }} />
        </div>
        <button onClick={handleEnter} disabled={loading} style={{ ...S.btn, ...S.btnPrimary, width: "100%" }}>
          {loading ? "Checking..." : "Enter Test →"}
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// TEACHER DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function TeacherDashboard({ teacher, onLogout }) {
  const [view, setViewState] = useState("tests");
  const [tests, setTests] = useState([]);
  const [decks, setDecks] = useState([]);
  const [editingTest, setEditingTest] = useState(null);
  const [editingDeck, setEditingDeck] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const setView = (newView) => {
    window.history.pushState({ screen: "teacher-dash", view: newView }, "", "");
    setViewState(newView);
  };

  useEffect(() => {
    const handlePop = (e) => {
      if (e.state?.screen === "teacher-dash" && e.state?.view) {
        setViewState(e.state.view);
      }
    };
    window.addEventListener("popstate", handlePop);
    return () => window.removeEventListener("popstate", handlePop);
  }, []);
  const [selectedTestId, setSelectedTestId] = useState(null);
  const [msg, setMsg] = useState("");
  const flash = (m) => { setMsg(m); setTimeout(() => setMsg(""), 3000); };

  const loadTests = useCallback(async () => {
    try {
      const data = await apiFetch('/tests');
      setTests(data.tests || (Array.isArray(data) ? data : []));
    } catch (e) { console.error('loadTests', e); }
  }, []);

  const loadDecks = useCallback(async () => {
    try {
      const data = await apiFetch('/decks');
      setDecks(data.decks || (Array.isArray(data) ? data : []));
    } catch (e) { console.error('loadDecks', e); }
  }, []);

  useEffect(() => { loadTests(); loadDecks(); }, [loadTests, loadDecks]);

  const saveTest = async (test, noNav = false) => {
    try {
      let saved;
      if (test.id && tests.find(t => t.id === test.id)) {
        const res = await apiFetch('/tests/' + test.id, { method: 'PUT', body: test });
        saved = res.test || res; // handle both {test:{...}} and direct object
        setTests(prev => prev.map(t => t.id === saved.id ? saved : t));
      } else {
        const res = await apiFetch('/tests', { method: 'POST', body: test });
        saved = res.test || res;
        setTests(prev => [saved, ...prev]);
      }
      if (!noNav) { await loadTests(); setView('tests'); }
    } catch (e) { flash('Error saving test: ' + e.message); }
  };
  const saveDeck = async (deck, noNav = false) => {
    try {
      let saved;
      if (deck.id && decks.find(d => d.id === deck.id)) {
        const res = await apiFetch('/decks/' + deck.id, { method: 'PUT', body: deck });
        saved = res.deck || res;
        setDecks(prev => prev.map(d => d.id === saved.id ? saved : d));
      } else {
        const res = await apiFetch('/decks', { method: 'POST', body: deck });
        saved = res.deck || res;
        setDecks(prev => [saved, ...prev]);
      }
      if (!noNav) { await loadDecks(); setView('decks'); }
    } catch (e) { flash('Error saving deck: ' + e.message); }
  };
  const deleteTest = async (id) => {
    try { await apiFetch('/tests/' + id, { method: 'DELETE' }); setTests(prev => prev.filter(t => t.id !== id)); flash('Test deleted.'); }
    catch (e) { flash('Error deleting: ' + e.message); }
  };
  const deleteDeck = async (id) => {
    try { await apiFetch('/decks/' + id, { method: 'DELETE' }); setDecks(prev => prev.filter(d => d.id !== id)); flash('Deck deleted.'); }
    catch (e) { flash('Error deleting: ' + e.message); }
  };

  return (
    <div style={S.dashWrap}>
      {/* Sidebar */}
      <div style={{
        ...S.sidebar,
        width: sidebarOpen ? "240px" : "56px",
        overflow: "hidden",
        transition: "width 0.25s ease",
        position: "relative",
        minHeight: "100vh"
      }}>
        {/* Toggle button */}
        <button onClick={() => setSidebarOpen(o => !o)} style={{
          position: "absolute", top: "1rem", right: "0.6rem",
          background: "rgba(255,255,255,0.1)", border: "none", borderRadius: "6px",
          color: "var(--paper)", cursor: "pointer", fontSize: "0.9rem",
          padding: "0.3rem 0.45rem", zIndex: 10, flexShrink: 0
        }} title={sidebarOpen ? "Collapse menu" : "Expand menu"}>
          {sidebarOpen ? "◀" : "▶"}
        </button>

        {sidebarOpen ? (
          <>
            <h2 style={S.sidebarTitle}>QuickTest</h2>
            <div style={{ fontSize: "0.8rem", color: "var(--muted)", marginBottom: "0.75rem" }}>{teacher.name || teacher.email}</div>
            <div style={{ height: "1px", background: "rgba(255,255,255,0.08)", marginBottom: "0.75rem" }} />
            <div style={{ fontSize: "0.7rem", letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(247,244,239,0.3)", padding: "0 1rem", marginBottom: "0.3rem" }}>Tests</div>
            {[{ id: "tests", icon: "📋", label: "My Tests" }, { id: "create", icon: "✏️", label: "Create Test" }].map(n => (
              <div key={n.id} style={{ ...S.navItem, ...(view === n.id || (view === "edit" && n.id === "create") ? S.navItemActive : {}) }}
                onClick={() => { setView(n.id); if (n.id === "create") setEditingTest(null); }}>
                {n.icon} {n.label}
              </div>
            ))}
            <div style={{ height: "1px", background: "rgba(255,255,255,0.08)", margin: "0.75rem 0 0.5rem" }} />
            <div style={{ fontSize: "0.7rem", letterSpacing: "0.1em", textTransform: "uppercase", color: "rgba(247,244,239,0.3)", padding: "0 1rem", marginBottom: "0.3rem" }}>Flashcards</div>
            {[{ id: "decks", icon: "🃏", label: "My Decks" }, { id: "create-deck", icon: "➕", label: "Create Deck" }].map(n => (
              <div key={n.id} style={{ ...S.navItem, ...(view === n.id || (view === "edit-deck" && n.id === "create-deck") ? S.navItemActive : {}) }}
                onClick={() => { setView(n.id); if (n.id === "create-deck") setEditingDeck(null); }}>
                {n.icon} {n.label}
              </div>
            ))}
            <div style={{ marginTop: "auto" }}>
              <div style={{ ...S.navItem }} onClick={onLogout}>🚪 Log Out</div>
            </div>
          </>
        ) : (
          /* Collapsed: show icons only */
          <div style={{ paddingTop: "3rem", display: "flex", flexDirection: "column", alignItems: "center", gap: "0.5rem" }}>
            {[
              { id: "tests", icon: "📋", matchViews: ["tests"] },
              { id: "create", icon: "✏️", matchViews: ["create", "edit"] },
              { id: "decks", icon: "🃏", matchViews: ["decks"] },
              { id: "create-deck", icon: "➕", matchViews: ["create-deck", "edit-deck"] }
            ].map(n => (
              <div key={n.id}
                title={n.id}
                style={{ ...S.navItem, ...(n.matchViews.includes(view) ? S.navItemActive : {}), justifyContent: "center", padding: "0.65rem", borderRadius: "8px", width: "40px", fontSize: "1.1rem" }}
                onClick={() => { setView(n.id); if (n.id === "create") setEditingTest(null); if (n.id === "create-deck") setEditingDeck(null); }}>
                {n.icon}
              </div>
            ))}
            <div style={{ marginTop: "auto", paddingTop: "1rem" }}>
              <div style={{ ...S.navItem, justifyContent: "center", padding: "0.65rem", width: "40px", fontSize: "1.1rem" }} onClick={onLogout} title="Log Out">🚪</div>
            </div>
          </div>
        )}
      </div>
      <div style={S.main}>
        {msg && <div style={{ ...S.success, position: "fixed", top: "1rem", right: "1rem", zIndex: 999 }}>{msg}</div>}
        {view === "tests" && <TestList tests={tests} onEdit={t => { setEditingTest(tests.find(x => x.id === t.id) || t); setView("edit"); }} onDelete={deleteTest} onGrades={t => { setSelectedTestId(t.id); setView("grades"); }} onSave={saveTest} flash={flash} onNew={() => setView("create")} />}
        {(view === "create" || view === "edit") && <TestBuilder test={editingTest} onSave={async (t) => { flash("Test saved!"); await saveTest(t); }} onCancel={() => setView("tests")} />}
        {view === "grades" && <GradesView testId={selectedTestId} tests={tests} onBack={() => setView("tests")} flash={flash} />}
        {view === "decks" && <DeckList decks={decks} onEdit={d => { setEditingDeck(d); setView("edit-deck"); }} onDelete={deleteDeck} onSave={saveDeck} flash={flash} onNew={() => { setEditingDeck(null); setView("create-deck"); }} />}
        {(view === "create-deck" || view === "edit-deck") && <DeckBuilder deck={editingDeck} onSave={async (d) => { flash("Deck saved!"); await saveDeck(d); }} onCancel={() => setView("decks")} />}
      </div>
    </div>
  );
}
// ─── TEST LIST ────────────────────────────────────────────────────────────────
function TestList({ tests, onEdit, onDelete, onGrades, onSave, flash, onNew }) {
  const toggleStatus = async (test) => {
    const newStatus = test.status === "active" ? "closed" : "active";
    await onSave({ ...test, status: newStatus }, true);
    flash(`Test ${newStatus === "active" ? "activated" : "closed"}`);
  };

  const regenerateCode = async (test) => {
    await onSave({ ...test, code: generateCode() }, true);
    flash("New code generated!");
  };

  return (
    <>
      <div style={S.topBar}>
        <div>
          <h1 style={S.pageTitle}>My Tests</h1>
          <p style={S.pageSub}>{tests.length} test{tests.length !== 1 ? "s" : ""} total</p>
        </div>
        <button onClick={onNew} style={{ ...S.btn, ...S.btnPrimary }}>+ Create New Test</button>
      </div>
      {tests.length === 0 && (
        <div style={{ ...S.card, textAlign: "center", padding: "4rem" }}>
          <div style={{ fontSize: "3rem", marginBottom: "1rem" }}>📋</div>
          <h3 style={{ marginBottom: "0.5rem" }}>No tests yet</h3>
          <p style={{ color: "var(--muted)", marginBottom: "1.5rem" }}>Create your first test to get started</p>
          <button onClick={onNew} style={{ ...S.btn, ...S.btnPrimary }}>Create Test</button>
        </div>
      )}
      <div style={S.grid}>
        {tests.map(test => (
          <div key={test.id} style={S.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.5rem" }}>
              <h3 style={S.cardTitle}>{test.title}</h3>
              <span style={{ ...S.badge, ...(test.status === "active" ? S.badgeActive : test.status === "closed" ? S.badgeClosed : S.badgeDraft) }}>
                {test.status}
              </span>
            </div>
            <p style={S.cardMeta}>
              {test.questions?.length || 0} questions · {test.questions?.reduce((s, q) => s + (q.points || 0), 0)} pts
              {test.randomizeQuestions && <span style={{ marginLeft: "0.5rem", ...S.badge, background: "#ede9fc", color: "#6b21a8", fontSize: "0.7rem" }}>🔀 Randomized</span>}
            </p>
            <div style={{ background: "var(--cream)", borderRadius: "8px", padding: "0.6rem 0.8rem", marginBottom: "1rem", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: "0.8rem", color: "var(--muted)" }}>Code:</span>
              <span style={{ fontFamily: "monospace", fontWeight: 700, letterSpacing: "0.15em", fontSize: "1.1rem" }}>{test.code}</span>
              <button onClick={() => regenerateCode(test)} title="New code" style={{ background: "none", border: "none", cursor: "pointer", fontSize: "1rem" }}>🔄</button>
            </div>
            <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap" }}>
              <button onClick={() => onEdit(test)} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.4rem 0.8rem" }}>Edit</button>
              <button onClick={() => toggleStatus(test)} style={{ ...S.btn, background: test.status === "active" ? "#fde8e4" : "#d4edda", color: test.status === "active" ? "#c84b31" : "#2d6a4f", border: "none", fontSize: "0.8rem", padding: "0.4rem 0.8rem", borderRadius: "8px" }}>
                {test.status === "active" ? "Close" : "Activate"}
              </button>
              <button onClick={() => onGrades(test)} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.4rem 0.8rem" }}>📊 Grades</button>
              <button onClick={() => { if (window.confirm("Delete this test? This cannot be undone.")) onDelete(test.id); }} style={{ ...S.btn, background: "none", border: "none", color: "var(--danger)", fontSize: "0.8rem", padding: "0.4rem 0.8rem", borderRadius: "8px" }}>🗑 Delete</button>
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

// ─── TEST BUILDER ─────────────────────────────────────────────────────────────
function TestBuilder({ test, onSave, onCancel }) {
  const [title, setTitle] = useState(test?.title || "");
  const [description, setDescription] = useState(test?.description || "");
  const [inApp, setInApp] = useState(test?.inApp !== false);
  const [allowCalculator, setAllowCalculator] = useState(test?.allowCalculator || false);
  const [randomizeQuestions, setRandomizeQuestions] = useState(test?.randomizeQuestions || false);
  const [questions, setQuestions] = useState(test?.questions || []);
  const [err, setErr] = useState("");
  const [showPaste, setShowPaste] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [pasteErr, setPasteErr] = useState("");
  const [showImport, setShowImport] = useState(false);
  const [importTests, setImportTests] = useState([]);
  const [importLoading, setImportLoading] = useState(false);
  const [importSelected, setImportSelected] = useState(null);
  const [importChecked, setImportChecked] = useState(new Set());

  const loadImportTests = async () => {
    setImportLoading(true);
    try {
      const data = await apiFetch('/tests');
      setImportTests((data.tests || (Array.isArray(data) ? data : [])).filter(t => t.id !== test?.id));
    } catch (e) { console.error('loadImportTests', e); }
    setImportLoading(false);
  };

  const openImport = () => {
    setShowImport(p => !p);
    setImportSelected(null);
    setImportChecked(new Set());
    if (!showImport) loadImportTests();
  };

  const importSelectedQuestions = () => {
    if (!importSelected) return;
    const srcTest = importTests.find(t => t.id === importSelected);
    if (!srcTest) return;
    const toAdd = srcTest.questions.filter((_, i) => importChecked.has(i)).map(q => ({ ...q, id: generateId() }));
    setQuestions(prev => [...prev, ...toAdd]);
    setShowImport(false);
    setImportSelected(null);
    setImportChecked(new Set());
  };

  const parsePastedQuestions = () => {
    setPasteErr("");
    const lines = pasteText.split("\n").map(l => l.trim()).filter(l => l);
    const parsed = [];
    let current = null;

    const optionRe = /^([A-Ea-e])[.)]\s+(.+)/;
    const questionRe = /^(?:\d+[.)]\s*)?(.+\?)\s*$/;
    const numberedRe = /^\d+[.)]\s+(.+)/;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const optMatch = line.match(optionRe);

      if (optMatch) {
        // It's an option line like "A. Paris" or "a) London"
        if (current) current.options.push(optMatch[2].trim());
      } else if (line.match(numberedRe) || line.match(questionRe)) {
        // Save previous question
        if (current) parsed.push(current);
        const text = (line.match(numberedRe)?.[1] || line).trim();
        // Detect true/false
        if (/true.*false|false.*true/i.test(text) || /^(true|false)$/i.test(text)) {
          current = { type: "true_false", text, options: [], correctAnswers: [], points: 1, required: true };
        } else {
          current = { type: "multiple_choice", text, options: [], correctAnswers: [], points: 1, required: true };
        }
      } else if (current) {
        // Continuation or standalone option without letter
        if (line.length > 0) current.options.push(line);
      }
    }
    if (current) parsed.push(current);

    // Convert questions with no options to short_answer
    parsed.forEach(q => {
      if (q.options.length === 0 && q.type === "multiple_choice") q.type = "short_answer";
      if (q.type === "true_false") q.options = ["True", "False"];
    });

    if (parsed.length === 0) {
      setPasteErr("Couldn't detect any questions. Make sure each question is numbered (1. 2. 3.) and options use letters (A. B. C.)");
      return;
    }

    setQuestions(prev => [...prev, ...parsed.map(q => ({ ...q, id: generateId() }))]);
    setPasteText("");
    setShowPaste(false);
    setPasteErr("");
  };

  const addQuestion = (type) => {
    setQuestions([...questions, {
      id: generateId(), type,
      text: "", points: 1,
      options: type === "essay" || type === "math" ? [] : ["", ""],
      correctAnswers: [],
      required: true
    }]);
  };

  const updateQuestion = useCallback((idx, patch) => {
    setQuestions(prev => prev.map((q, i) => i === idx ? { ...q, ...patch } : q));
  }, []);

  const removeQuestion = useCallback((idx) => {
    setQuestions(prev => prev.filter((_, i) => i !== idx));
  }, []);

  const moveQuestion = useCallback((idx, dir) => {
    setQuestions(prev => {
      const qs = [...prev];
      const target = idx + dir;
      if (target < 0 || target >= qs.length) return prev;
      [qs[idx], qs[target]] = [qs[target], qs[idx]];
      return qs;
    });
  }, []);

  const [saving, setSaving] = useState(false);
  const handleSave = async () => {
    if (!title.trim()) { setErr("Please add a title."); return; }
    if (questions.length === 0) { setErr("Add at least one question."); return; }
    for (let i = 0; i < questions.length; i++) {
      if (!questions[i].text.trim()) { setErr(`Question ${i + 1} has no text.`); return; }
    }
    const saved = {
      title: title.trim(),
      description: description.trim(),
      inApp,
      allowCalculator,
      randomizeQuestions,
      questions: questions,
      code: test?.code || generateCode(),
      status: test?.status || "draft",
      createdAt: test?.createdAt || Date.now(),
      updatedAt: Date.now()
    };
    if (test?.id) saved.id = test.id;
    setSaving(true);
    setErr("");
    try {
      await onSave(saved);
    } catch (e) {
      setErr("Failed to save: " + e.message);
      setSaving(false);
    }
  };

  return (
    <>
      <div style={S.topBar}>
        <div>
          <h1 style={S.pageTitle}>{test ? "Edit Test" : "Create Test"}</h1>
          <p style={S.pageSub}>Build your assessment</p>
        </div>
        <div style={{ display: "flex", gap: "0.75rem" }}>
          <button onClick={onCancel} disabled={saving} style={{ ...S.btn, ...S.btnGhost, opacity: saving ? 0.5 : 1 }}>Cancel</button>
          <button onClick={handleSave} disabled={saving} style={{ ...S.btn, ...S.btnPrimary, opacity: saving ? 0.7 : 1 }}>{saving ? "Saving..." : "Save Test"}</button>
        </div>
      </div>
      {err && <div style={S.error}>{err}</div>}
      <div style={{ ...S.card, marginBottom: "1.5rem" }}>
        <div style={S.fieldGroup}>
          <label style={S.label}>Test Title *</label>
          <input style={S.input} value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Chapter 5 Quiz" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Description / Instructions</label>
          <textarea style={S.textarea} value={description} onChange={e => setDescription(e.target.value)} placeholder="Any instructions for students..." />
        </div>
        <div style={{ display: "flex", gap: "1rem", alignItems: "center", flexWrap: "wrap" }}>
          <label style={{ display: "flex", alignItems: "center", gap: "0.5rem", cursor: "pointer" }}>
            <input type="checkbox" checked={inApp} onChange={e => setInApp(e.target.checked)} />
            <span style={{ fontSize: "0.9rem" }}>Students complete in-app</span>
          </label>
          <span style={{ color: "var(--muted)", fontSize: "0.85rem" }}>
            {inApp ? "App will grade automatically" : "Print/paper — questions shown on screen, answers on paper"}
          </span>
          <label style={{ display: "flex", alignItems: "center", gap: "0.5rem", cursor: "pointer", marginLeft: "0.5rem" }}>
            <input type="checkbox" checked={allowCalculator} onChange={e => setAllowCalculator(e.target.checked)} />
            <span style={{ fontSize: "0.9rem" }}>🧮 Allow calculator</span>
          </label>
          <span style={{ color: "var(--muted)", fontSize: "0.85rem" }}>
            {allowCalculator ? "Scientific calculator available to students" : "No calculator access"}
          </span>
          <label style={{ display: "flex", alignItems: "center", gap: "0.5rem", cursor: "pointer", marginLeft: "0.5rem" }}>
            <input type="checkbox" checked={randomizeQuestions} onChange={e => setRandomizeQuestions(e.target.checked)} />
            <span style={{ fontSize: "0.9rem" }}>🔀 Randomize question order</span>
          </label>
          <span style={{ color: "var(--muted)", fontSize: "0.85rem" }}>
            {randomizeQuestions ? "Each student gets questions in a unique random order" : "All students see questions in the same order"}
          </span>
        </div>
      </div>

      {questions.map((q, idx) => (
        <QuestionEditor key={q.id} q={q} idx={idx} total={questions.length}
          onChange={patch => updateQuestion(idx, patch)}
          onRemove={() => removeQuestion(idx)}
          onMove={dir => moveQuestion(idx, dir)}
          inApp={inApp}
        />
      ))}

      <div style={{ ...S.card, background: "var(--cream)", border: "2px dashed var(--border)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
          <p style={{ fontWeight: 600 }}>Add Question</p>
          <div style={{ display: "flex", gap: "0.5rem" }}>
            <button onClick={openImport} style={{ ...S.btn, background: "#f0e8fd", color: "#6b21a8", border: "none", fontSize: "0.8rem", padding: "0.35rem 0.8rem", borderRadius: "8px" }}>
              📥 Import from Test
            </button>
            <button onClick={() => setShowPaste(p => !p)} style={{ ...S.btn, background: "#e8f4fd", color: "#1a6fa8", border: "none", fontSize: "0.8rem", padding: "0.35rem 0.8rem", borderRadius: "8px" }}>
              📋 Paste from Word / Web
            </button>
          </div>
        </div>

        {showImport && (
          <div style={{ marginBottom: "1rem", padding: "1rem", background: "var(--white)", borderRadius: "10px", border: "1.5px solid var(--border)" }}>
            <p style={{ fontSize: "0.85rem", fontWeight: 600, marginBottom: "0.75rem" }}>Import questions from another test</p>
            {importLoading && <p style={{ color: "var(--muted)", fontSize: "0.85rem" }}>Loading tests...</p>}
            {!importLoading && importTests.length === 0 && <p style={{ color: "var(--muted)", fontSize: "0.85rem" }}>No other tests found.</p>}
            {!importLoading && importTests.length > 0 && (
              <>
                <div style={{ marginBottom: "0.75rem" }}>
                  <label style={S.label}>Select a test to import from</label>
                  <select
                    style={S.select}
                    value={importSelected || ""}
                    onChange={e => { setImportSelected(e.target.value); setImportChecked(new Set()); }}
                  >
                    <option value="">— Choose a test —</option>
                    {importTests.map(t => (
                      <option key={t.id} value={t.id}>{t.title} ({t.questions?.length || 0} questions)</option>
                    ))}
                  </select>
                </div>
                {importSelected && (() => {
                  const srcTest = importTests.find(t => t.id === importSelected);
                  return srcTest ? (
                    <div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>
                        <label style={S.label}>Pick questions to import</label>
                        <button onClick={() => setImportChecked(importChecked.size === srcTest.questions.length ? new Set() : new Set(srcTest.questions.map((_, i) => i)))}
                          style={{ background: "none", border: "none", fontSize: "0.8rem", color: "var(--accent2)", cursor: "pointer", fontWeight: 600 }}>
                          {importChecked.size === srcTest.questions.length ? "Deselect all" : "Select all"}
                        </button>
                      </div>
                      <div style={{ maxHeight: "220px", overflowY: "auto", border: "1px solid var(--border)", borderRadius: "8px" }}>
                        {srcTest.questions.map((q, i) => (
                          <label key={`import-q-${i}`} style={{ display: "flex", alignItems: "flex-start", gap: "0.6rem", padding: "0.6rem 0.75rem", borderBottom: i < srcTest.questions.length - 1 ? "1px solid var(--border)" : "none", cursor: "pointer", background: importChecked.has(i) ? "#f0e8fd" : "transparent" }}>
                            <input type="checkbox" checked={importChecked.has(i)} onChange={() => {
                              const next = new Set(importChecked);
                              next.has(i) ? next.delete(i) : next.add(i);
                              setImportChecked(next);
                            }} style={{ marginTop: "2px", flexShrink: 0 }} />
                            <span style={{ fontSize: "0.85rem" }}>
                              <span style={{ ...S.badge, background: "var(--cream)", color: "var(--muted)", marginRight: "0.4rem", fontSize: "0.7rem" }}>{q.type.replace("_", " ")}</span>
                              {q.text}
                            </span>
                          </label>
                        ))}
                      </div>
                      <div style={{ display: "flex", gap: "0.5rem", marginTop: "0.75rem" }}>
                        <button onClick={importSelectedQuestions} disabled={importChecked.size === 0}
                          style={{ ...S.btn, ...S.btnPrimary, fontSize: "0.85rem", opacity: importChecked.size === 0 ? 0.5 : 1 }}>
                          Import {importChecked.size > 0 ? `${importChecked.size} ` : ""}Question{importChecked.size !== 1 ? "s" : ""}
                        </button>
                        <button onClick={() => setShowImport(false)} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.85rem" }}>Cancel</button>
                      </div>
                    </div>
                  ) : null;
                })()}
              </>
            )}
          </div>
        )}
        {showPaste && (
          <div style={{ marginBottom: "1rem", padding: "1rem", background: "var(--white)", borderRadius: "10px", border: "1.5px solid var(--border)" }}>
            <p style={{ fontSize: "0.8rem", color: "var(--muted)", marginBottom: "0.5rem" }}>
              Paste questions below. Format: numbered questions (1. 2. 3.) with lettered options (A. B. C.) on separate lines. Questions without options become short answer.
            </p>
            <textarea
              style={{ ...S.textarea, minHeight: "160px", fontSize: "0.85rem", marginBottom: "0.5rem" }}
              value={pasteText}
              onChange={e => setPasteText(e.target.value)}
              placeholder={"1. What is the capital of France?\nA. London\nB. Paris\nC. Berlin\nD. Madrid\n\n2. Explain photosynthesis.\n\n3. The sky is blue.\nA. True\nB. False"}
            />
            {pasteErr && <div style={{ ...S.error, marginBottom: "0.5rem" }}>{pasteErr}</div>}
            <div style={{ display: "flex", gap: "0.5rem" }}>
              <button onClick={parsePastedQuestions} style={{ ...S.btn, ...S.btnPrimary, fontSize: "0.85rem" }}>Import Questions</button>
              <button onClick={() => { setShowPaste(false); setPasteText(""); setPasteErr(""); }} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.85rem" }}>Cancel</button>
            </div>
          </div>
        )}
        <div style={{ display: "flex", gap: "0.75rem", flexWrap: "wrap" }}>
          {[
            { type: "multiple_choice", label: "Multiple Choice", icon: "🔘" },
            { type: "multiple_select", label: "Multiple Select", icon: "☑️" },
            { type: "true_false", label: "True / False", icon: "✅" },
            { type: "short_answer", label: "Short Answer", icon: "📝" },
            { type: "essay", label: "Essay", icon: "📄" },
            { type: "math", label: "Math", icon: "🔢" },
          ].map(t => (
            <button key={t.type} onClick={() => addQuestion(t.type)}
