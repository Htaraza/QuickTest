            </button>
          ))}
        </div>
      </div>
    </>
  );
}

// ─── MATH SYMBOL PICKER ──────────────────────────────────────────────────────
const MATH_SYMBOLS = [
  { group: "Basic", symbols: ["+", "−", "×", "÷", "=", "≠", "<", ">", "≤", "≥", "±", "∓"] },
  { group: "Algebra", symbols: ["x", "y", "z", "n", "a", "b", "²", "³", "ⁿ", "√", "∛", "∜"] },
  { group: "Fractions", symbols: ["½", "⅓", "¼", "¾", "⅔", "⅛", "⅜", "⅝", "⅞", "/", "(", ")"] },
  { group: "Calc / Trig", symbols: ["π", "∞", "θ", "α", "β", "γ", "Δ", "∑", "∫", "∂", "°", "′"] },
  { group: "Sets / Logic", symbols: ["∈", "∉", "⊂", "⊃", "∪", "∩", "∅", "∀", "∃", "→", "↔", "¬"] },
];

function MathSymbolPicker({ onInsert }) {
  const [open, setOpen] = useState(false);
  const [activeGroup, setActiveGroup] = useState(MATH_SYMBOLS[0].group);
  const group = MATH_SYMBOLS.find(g => g.group === activeGroup);
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);
  return (
    <div ref={wrapRef} style={{ position: "relative", display: "inline-block", overflow: "visible" }}>
      <button type="button" onClick={() => setOpen(o => !o)}
        style={{ ...S.btn, background: "#e8f4fd", color: "#1a6fa8", border: "1.5px solid #b8d9f0", fontSize: "0.82rem", padding: "0.35rem 0.8rem" }}>
        ∑ Insert Symbol
      </button>
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 6px)", right: 0, zIndex: 200, background: "#fff", border: "1.5px solid var(--border)", borderRadius: "12px", boxShadow: "0 8px 32px rgba(0,0,0,0.14)", padding: "0.75rem", width: "min(340px, 90vw)" }}>
          <div style={{ display: "flex", gap: "0.3rem", flexWrap: "wrap", marginBottom: "0.6rem" }}>
            {MATH_SYMBOLS.map(g => (
              <button key={g.group} type="button" onClick={() => setActiveGroup(g.group)}
                style={{ fontSize: "0.75rem", padding: "0.2rem 0.55rem", borderRadius: "6px", border: "1px solid var(--border)", cursor: "pointer", background: activeGroup === g.group ? "var(--ink)" : "var(--cream)", color: activeGroup === g.group ? "var(--paper)" : "var(--ink)", fontWeight: 600 }}>
                {g.group}
              </button>
            ))}
          </div>
          <div style={{ display: "flex", gap: "0.35rem", flexWrap: "wrap" }}>
            {group.symbols.map(sym => (
              <button key={sym} type="button" onClick={() => { onInsert(sym); }}
                style={{ fontSize: "1.1rem", padding: "0.3rem 0.45rem", borderRadius: "6px", border: "1px solid var(--border)", cursor: "pointer", background: "var(--cream)", minWidth: "36px", textAlign: "center" }}>
                {sym}
              </button>
            ))}
          </div>
          <button type="button" onClick={() => setOpen(false)} style={{ marginTop: "0.5rem", fontSize: "0.75rem", background: "none", border: "none", cursor: "pointer", color: "var(--muted)" }}>Close ✕</button>
        </div>
      )}
    </div>
  );
}

function MathQuestionEditor({ q, onChange, inApp }) {
  const textRef = useRef(null);
  const answerRef = useRef(null);
  const [focusedField, setFocusedField] = useState("question"); // "question" | "answer"

  const insertSymbol = (sym) => {
    const ref = focusedField === "answer" ? answerRef : textRef;
    if (!ref.current) { onChange({ text: q.text + sym }); return; }
    const el = ref.current;
    const start = el.selectionStart;
    const end = el.selectionEnd;
    if (focusedField === "answer") {
      const cur = q.correctAnswers?.[0] || "";
      const newVal = cur.slice(0, start) + sym + cur.slice(end);
      onChange({ correctAnswers: [newVal] });
    } else {
      const newVal = q.text.slice(0, start) + sym + q.text.slice(end);
      onChange({ text: newVal });
    }
    setTimeout(() => { el.focus(); el.setSelectionRange(start + sym.length, start + sym.length); }, 10);
  };

  return (
    <div style={{ marginTop: "0.5rem" }}>
      <div style={{ background: "#f0f7ff", border: "1.5px solid #b8d9f0", borderRadius: "8px", padding: "0.6rem 0.8rem", marginBottom: "0.75rem", fontSize: "0.82rem", color: "#1a6fa8" }}>
        🔢 Math Question — Use the symbol picker to insert math symbols. Students will see a scientific calculator (if enabled).
      </div>
      <div style={S.fieldGroup}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.4rem", overflow: "visible", position: "relative", zIndex: 10 }}>
          <label style={S.label}>Question (math expression / word problem)</label>
          <MathSymbolPicker onInsert={insertSymbol} />
        </div>
        <textarea
          ref={textRef}
          style={{ ...S.textarea, minHeight: "70px", fontFamily: "monospace", fontSize: "1rem" }}
          value={q.text}
          onChange={e => onChange({ text: e.target.value })}
          onFocus={() => setFocusedField("question")}
          placeholder="e.g.  Solve for x:  3x + 7 = 22"
        />
      </div>
      {inApp && (
        <div style={S.fieldGroup}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.4rem" }}>
            <label style={S.label}>Correct Answer (accepted, case-insensitive)</label>
          </div>
          <input
            ref={answerRef}
            style={{ ...S.input, fontFamily: "monospace" }}
            value={q.correctAnswers?.[0] || ""}
            onFocus={() => setFocusedField("answer")}
            onChange={e => onChange({ correctAnswers: [e.target.value] })}
            placeholder="e.g.  5  or  x = 5"
          />
          <p style={{ fontSize: "0.78rem", color: "var(--muted)", marginTop: "0.3rem" }}>Students must enter an exact match. Leave blank for manual grading.</p>
        </div>
      )}
    </div>
  );
}

// ─── SCIENTIFIC CALCULATOR ────────────────────────────────────────────────────
function ScientificCalculator({ onClose }) {
  const [display, setDisplay] = useState("0");
  const [expr, setExpr] = useState("");
  const [justEvaluated, setJustEvaluated] = useState(false);
  const [mem, setMem] = useState(0);
  const [deg, setDeg] = useState(true);
  const [activeTab, setActiveTab] = useState("basic");

  const press = (val) => {
    if (val === "C") { setDisplay("0"); setExpr(""); setJustEvaluated(false); return; }
    if (val === "⌫") {
      if (justEvaluated) { setDisplay("0"); setExpr(""); setJustEvaluated(false); return; }
      const nd = display.length > 1 ? display.slice(0, -1) : "0";
      setDisplay(nd); setExpr(prev => prev.slice(0, -1)); return;
    }
    if (val === "=") {
      try {
        let ev = expr
          .replace(/×/g, "*").replace(/÷/g, "/").replace(/−/g, "-")
          .replace(/π/g, `(${Math.PI})`).replace(/\be\b/g, `(${Math.E})`)
          .replace(/sin\(/g, `Math.sin(toRad(`).replace(/cos\(/g, `Math.cos(toRad(`).replace(/tan\(/g, `Math.tan(toRad(`)
          .replace(/√\(/g, `Math.sqrt(`).replace(/log\(/g, `Math.log10(`).replace(/ln\(/g, `Math.log(`)
          .replace(/\^/g, "**").replace(/abs\(/g, `Math.abs(`);
        ev += ")".repeat((ev.match(/toRad\(/g) || []).length);
        const result = Function(`"use strict"; const toRad = (x) => ${deg} ? x * Math.PI / 180 : x; return (${ev})`)();
        const res = isFinite(result) ? (Number.isInteger(result) ? String(result) : parseFloat(result.toFixed(10)).toString()) : "Error";
        setDisplay(res); setExpr(res); setJustEvaluated(true);
      } catch { setDisplay("Error"); setExpr(""); setJustEvaluated(true); }
      return;
    }
    if (val === "M+") { setMem(m => m + parseFloat(display || 0)); return; }
    if (val === "MR") { const mv = String(mem); setDisplay(mv); setExpr(prev => justEvaluated ? mv : prev + mv); setJustEvaluated(false); return; }
    if (val === "MC") { setMem(0); return; }
    if (val === "±") { const n = parseFloat(display) * -1; const s = String(n); setDisplay(s); setExpr(prev => { const p = justEvaluated ? "" : prev; return p.slice(0, -display.length) + s; }); return; }
    if (val === "%") { const n = parseFloat(display) / 100; const s = String(n); setDisplay(s); setExpr(prev => justEvaluated ? s : prev.slice(0, -display.length) + s); setJustEvaluated(false); return; }
    const funcKeys = ["sin", "cos", "tan", "√", "log", "ln", "abs"];
    if (funcKeys.includes(val)) {
      const token = val + "(";
      if (justEvaluated) { setDisplay(token); setExpr(token); setJustEvaluated(false); }
      else { setDisplay(display + token); setExpr(prev => prev + token); }
      return;
    }
    if (val === "x²") { setDisplay(display + "^2"); setExpr(prev => (justEvaluated ? display : prev) + "^2"); setJustEvaluated(false); return; }
    if (val === "xʸ") { setDisplay(display + "^"); setExpr(prev => (justEvaluated ? display : prev) + "^"); setJustEvaluated(false); return; }
    if (val === "1/x") { const n = 1 / parseFloat(display); setDisplay(String(n)); setExpr(String(n)); setJustEvaluated(true); return; }
    if (val === "DEG" || val === "RAD") { setDeg(d => !d); return; }
    const isOp = ["+", "−", "×", "÷", "(", ")", "."].includes(val);
    if (justEvaluated && !isOp) { setDisplay(val); setExpr(val); setJustEvaluated(false); }
    else if (justEvaluated && isOp) { setDisplay(display + val); setExpr(display + val); setJustEvaluated(false); }
    else { const nd = display === "0" && !isOp ? val : display + val; setDisplay(nd); setExpr(prev => prev + val); }
  };

  const num = "#1e1e2e", op = "#e87b1e", fn = "#2d5a8e", util = "#3a3a4a", eq = "#2d6a4f", clr = "#c84b31";
  const Btn = ({ l, bg, wide, title: tt }) => (
    <button onClick={() => press(l)} title={tt || l}
      style={{ flex: wide ? 2 : 1, padding: "0.72rem 0.2rem", borderRadius: "10px", border: "none",
        cursor: "pointer", fontSize: "0.93rem", fontWeight: 600, background: bg, color: "#fff",
        minWidth: 0, transition: "filter 0.1s" }}
      onPointerDown={e => e.currentTarget.style.filter = "brightness(0.75)"}
      onPointerUp={e => e.currentTarget.style.filter = ""}
      onPointerLeave={e => e.currentTarget.style.filter = ""}>
      {l}
    </button>
  );

  const tabBtn = (id, label) => (
    <button onClick={() => setActiveTab(id)} style={{
      flex: 1, padding: "0.38rem 0.2rem", border: "none", borderRadius: "7px", cursor: "pointer",
      fontSize: "0.78rem", fontWeight: 600,
      background: activeTab === id ? "rgba(255,255,255,0.18)" : "transparent",
      color: activeTab === id ? "#fff" : "rgba(255,255,255,0.45)",
    }}>{label}</button>
  );

  return (
    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 500,
      background: "#12121e", borderRadius: "20px 20px 0 0", boxShadow: "0 -8px 40px rgba(0,0,0,0.6)",
      paddingBottom: "env(safe-area-inset-bottom)" }}>

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0.55rem 1rem 0.2rem" }}>
        <span style={{ color: "rgba(255,255,255,0.35)", fontSize: "0.68rem", letterSpacing: "0.1em", textTransform: "uppercase" }}>🧮 Calculator</span>
        <button onClick={onClose} style={{ background: "rgba(255,255,255,0.1)", border: "none", borderRadius: "20px", padding: "0.18rem 0.65rem", color: "#fff", cursor: "pointer", fontSize: "0.77rem" }}>Hide ↓</button>
      </div>

      <div style={{ padding: "0 1rem 0.35rem", textAlign: "right" }}>
        <div style={{ fontSize: "0.67rem", color: "rgba(255,255,255,0.28)", minHeight: "1em", wordBreak: "break-all" }}>{expr || " "}</div>
        <div style={{ fontSize: "1.85rem", color: "#fff", fontFamily: "monospace", fontWeight: 300, wordBreak: "break-all", lineHeight: 1.2 }}>{display}</div>
      </div>

      <div style={{ display: "flex", gap: "0.25rem", padding: "0 0.75rem 0.35rem" }}>
        {tabBtn("basic", "Basic")}
        {tabBtn("functions", "Functions")}
        {tabBtn("memory", "Memory")}
      </div>

      <div style={{ padding: "0 0.75rem 0.75rem", display: "flex", flexDirection: "column", gap: "0.38rem" }}>
        {activeTab === "basic" && (<>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="C" bg={clr} /><Btn l="±" bg={util} /><Btn l="%" bg={util} /><Btn l="⌫" bg={util} />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="1" bg={num} /><Btn l="2" bg={num} /><Btn l="3" bg={num} /><Btn l="÷" bg={op} />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="4" bg={num} /><Btn l="5" bg={num} /><Btn l="6" bg={num} /><Btn l="×" bg={op} />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="7" bg={num} /><Btn l="8" bg={num} /><Btn l="9" bg={num} /><Btn l="−" bg={op} />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="0" bg={num} wide /><Btn l="." bg={num} /><Btn l="+" bg={op} /><Btn l="=" bg={eq} />
          </div>
        </>)}

        {activeTab === "functions" && (<>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l={deg ? "DEG" : "RAD"} bg={util} title="Toggle degrees / radians" />
            <Btn l="(" bg={util} /><Btn l=")" bg={util} /><Btn l="⌫" bg={util} />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="sin" bg={fn} title="Sine" /><Btn l="cos" bg={fn} title="Cosine" /><Btn l="tan" bg={fn} title="Tangent" /><Btn l="π" bg={fn} title="Pi (3.14159…)" />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="√" bg={fn} title="Square root" /><Btn l="x²" bg={fn} title="Square (x²)" /><Btn l="xʸ" bg={fn} title="Power (xʸ)" /><Btn l="1/x" bg={fn} title="Reciprocal" />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="log" bg={fn} title="Log base 10" /><Btn l="ln" bg={fn} title="Natural log" /><Btn l="abs" bg={fn} title="Absolute value" /><Btn l="e" bg={fn} title="Euler's number (2.718…)" />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="1" bg={num} /><Btn l="2" bg={num} /><Btn l="3" bg={num} /><Btn l="=" bg={eq} />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="4" bg={num} /><Btn l="5" bg={num} /><Btn l="6" bg={num} /><Btn l="C" bg={clr} />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="7" bg={num} /><Btn l="8" bg={num} /><Btn l="9" bg={num} /><Btn l="+" bg={op} />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="0" bg={num} wide /><Btn l="." bg={num} /><Btn l="−" bg={op} />
          </div>
        </>)}

        {activeTab === "memory" && (<>
          <div style={{ padding: "0.45rem 0.75rem", background: "rgba(255,255,255,0.06)", borderRadius: "8px", marginBottom: "0.2rem" }}>
            <div style={{ fontSize: "0.65rem", color: "rgba(255,255,255,0.35)", marginBottom: "0.15rem" }}>STORED VALUE</div>
            <div style={{ fontFamily: "monospace", color: "#fff", fontSize: "1.05rem" }}>{mem || "0"}</div>
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="MC" bg={util} title="Clear memory" /><Btn l="MR" bg={util} title="Recall memory" /><Btn l="M+" bg={util} title="Add display to memory" />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="1" bg={num} /><Btn l="2" bg={num} /><Btn l="3" bg={num} /><Btn l="÷" bg={op} />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="4" bg={num} /><Btn l="5" bg={num} /><Btn l="6" bg={num} /><Btn l="×" bg={op} />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="7" bg={num} /><Btn l="8" bg={num} /><Btn l="9" bg={num} /><Btn l="−" bg={op} />
          </div>
          <div style={{ display: "flex", gap: "0.38rem" }}>
            <Btn l="0" bg={num} wide /><Btn l="." bg={num} /><Btn l="+" bg={op} /><Btn l="=" bg={eq} />
          </div>
        </>)}
      </div>
    </div>
  );
}

const QuestionEditor = memo(function QuestionEditor({ q, idx, total, onChange, onRemove, onMove, inApp }) {
  const typeLabels = { multiple_choice: "Multiple Choice", multiple_select: "Multiple Select", true_false: "True / False", short_answer: "Short Answer", essay: "Essay", math: "Math Question" };

  const addOption = () => onChange({ options: [...q.options, ""] });
  const updateOption = (i, val) => onChange({ options: q.options.map((o, j) => j === i ? val : o) });
  const removeOption = (i) => onChange({ options: q.options.filter((_, j) => j !== i), correctAnswers: q.correctAnswers.filter(a => a !== q.options[i]) });
  const toggleCorrect = (opt) => {
    if (q.type === "multiple_choice" || q.type === "true_false") {
      onChange({ correctAnswers: [opt] });
    } else {
      const cur = q.correctAnswers || [];
      onChange({ correctAnswers: cur.includes(opt) ? cur.filter(a => a !== opt) : [...cur, opt] });
    }
  };

  return (
    <div style={S.qCard}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
          <span style={{ ...S.badge, background: "var(--cream)", color: "var(--muted)" }}>Q{idx + 1}</span>
          <span style={{ fontSize: "0.8rem", color: "var(--muted)" }}>{typeLabels[q.type]}</span>
        </div>
        <div style={{ display: "flex", gap: "0.4rem" }}>
          <button onClick={() => onMove(-1)} disabled={idx === 0} style={{ background: "none", border: "none", cursor: "pointer", opacity: idx === 0 ? 0.3 : 1 }}>↑</button>
          <button onClick={() => onMove(1)} disabled={idx === total - 1} style={{ background: "none", border: "none", cursor: "pointer", opacity: idx === total - 1 ? 0.3 : 1 }}>↓</button>
          <button onClick={onRemove} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--danger)" }}>✕</button>
        </div>
      </div>

      {q.type !== "math" && (
        <div style={S.fieldGroup}>
          <label style={S.label}>Question Text *</label>
          <textarea style={{ ...S.textarea, minHeight: "70px" }} value={q.text} onChange={e => onChange({ text: e.target.value })} placeholder="Enter your question..." />
        </div>
      )}

      <div style={{ display: "flex", gap: "1rem", alignItems: "flex-start", flexWrap: "wrap" }}>
        <div style={{ flex: 1, minWidth: "80px" }}>
          <label style={S.label}>Points</label>
          <input style={{ ...S.input, width: "80px" }} type="number" min="0" value={q.points} onChange={e => onChange({ points: Number(e.target.value) })} />
        </div>
      </div>

      {/* Options for MC/MS/TF */}
      {["multiple_choice", "multiple_select", "true_false"].includes(q.type) && (
        <div style={{ marginTop: "1rem" }}>
          <label style={S.label}>Options {inApp && <span style={{ color: "var(--accent2)" }}>(✓ = correct answer{q.type === "multiple_select" ? "s" : ""})</span>}</label>
          {q.type === "true_false" ? (
            ["True", "False"].map(opt => (
              <div key={opt} style={S.optionRow}>
                {inApp && (
                  <input type="radio" checked={q.correctAnswers?.includes(opt)} onChange={() => toggleCorrect(opt)} />
                )}
                <span style={{ fontSize: "0.95rem" }}>{opt}</span>
              </div>
            ))
          ) : (
            <>
              {q.options.map((opt, i) => (
                <div key={`opt-${i}`} style={S.optionRow}>
                  {inApp && (
                    q.type === "multiple_choice"
                      ? <input type="radio" checked={q.correctAnswers?.includes(opt)} onChange={() => toggleCorrect(opt)} />
                      : <input type="checkbox" checked={q.correctAnswers?.includes(opt)} onChange={() => toggleCorrect(opt)} />
                  )}
                  <input style={{ ...S.input, flex: 1 }} value={opt} onChange={e => updateOption(i, e.target.value)} placeholder={`Option ${i + 1}`} />
                  {q.options.length > 2 && <button onClick={() => removeOption(i)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--muted)" }}>✕</button>}
                </div>
              ))}
              <button onClick={addOption} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.4rem 0.8rem", marginTop: "0.5rem" }}>+ Option</button>
            </>
          )}
        </div>
      )}

      {q.type === "short_answer" && inApp && (
        <div style={{ marginTop: "1rem" }}>
          <label style={S.label}>Accepted Answers (comma-separated, case-insensitive)</label>
          <input style={S.input} value={q.correctAnswers?.join(", ") || ""} onChange={e => onChange({ correctAnswers: e.target.value.split(",").map(a => a.trim()).filter(a => a.length > 0) })} placeholder="e.g. Paris, paris" />
        </div>
      )}

      {q.type === "math" && (
        <MathQuestionEditor q={q} onChange={onChange} inApp={inApp} />
      )}
    </div>
  );
});

// ─── GRADES VIEW ──────────────────────────────────────────────────────────────
function GradesView({ testId, tests, onBack, flash }) {
  const [submissions, setSubmissions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [detailIndex, setDetailIndex] = useState(null);
  const test = tests.find(t => t.id === testId);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const data = await apiFetch(`/submissions/test/${testId}`);
      setSubmissions(data.submissions || []);
    } catch (e) { console.error('load submissions', e); }
    setLoading(false);
  }, [testId]);

  useEffect(() => { load(); }, [load]);

  const allowRetake = async (sub) => {
    try {
      await apiFetch(`/submissions/${sub.id}/retake`, { method: 'PATCH' });
      flash(`Retake allowed for ${sub.email}.`);
      setSubmissions(prev => prev.map(s => s.id === sub.id ? { ...s, retakeAllowed: true } : s));
    } catch (e) { flash('Error: ' + e.message); }
  };

  const gradeManually = async (sub, qIdx, score, subIndex) => {
    try {
      const res = await apiFetch(`/submissions/${sub.id}/grade`, { method: 'PATCH', body: { questionIndex: qIdx, score } });
      setSubmissions(prev => prev.map((s, i) => i === subIndex ? { ...s, answers: res.answers, totalScore: res.totalScore, percentage: res.percentage } : s));
    } catch (e) { flash('Error saving grade: ' + e.message); }
  };

  if (!test) return <div>Test not found. <button onClick={onBack}>Back</button></div>;

  if (detailIndex !== null) {
    const detail = submissions[detailIndex];
    return (
      <>
        <div style={S.topBar}>
          <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "0.75rem" }}>
              <button onClick={() => setDetailIndex(null)} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.3rem 0.7rem" }}>← All Students</button>
              <select
                value={detailIndex}
                onChange={e => setDetailIndex(Number(e.target.value))}
                style={{ ...S.input, padding: "0.35rem 0.75rem", fontSize: "0.9rem", maxWidth: "260px" }}
              >
                {submissions.map((s, i) => (
                  <option key={s.id} value={i}>{s.email} — {s.invalidated ? "Invalidated" : `${s.percentage}%`}</option>
                ))}
              </select>
            </div>
            <p style={S.pageSub}>{test.title} · Submitted {new Date(detail.submittedAt).toLocaleString()}</p>
          </div>
          <div style={{ display: "flex", gap: "0.5rem", alignItems: "center" }}>
            <span style={{ fontSize: "1.5rem", fontFamily: "'DM Serif Display',serif" }}>{detail.percentage}%</span>
            <button
              onClick={() => setDetailIndex(n => Math.max(0, n - 1))}
              disabled={detailIndex === 0}
              style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.3rem 0.7rem", opacity: detailIndex === 0 ? 0.4 : 1 }}
            >← Prev</button>
            <button
              onClick={() => setDetailIndex(n => Math.min(submissions.length - 1, n + 1))}
              disabled={detailIndex === submissions.length - 1}
              style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.3rem 0.7rem", opacity: detailIndex === submissions.length - 1 ? 0.4 : 1 }}
            >Next →</button>
          </div>
        </div>
        <div style={{ marginBottom: "0.75rem", fontSize: "0.85rem", color: "var(--muted)" }}>
          Student {detailIndex + 1} of {submissions.length}
        </div>
        {test.questions.map((q, i) => {
          const ans = detail.answers?.[i];
          const score = ans?.manualScore !== undefined ? ans.manualScore : (ans?.autoScore || 0);
          return (
            <div key={q.id} style={{ ...S.card, marginBottom: "1rem" }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "0.5rem" }}>
                <strong>Q{i + 1}: {q.text}</strong>
                <div style={{ display: "flex", gap: "0.5rem", alignItems: "center", fontSize: "0.85rem" }}>
                  <input type="number" min="0" max={q.points} defaultValue={score}
                    onBlur={e => { const v = Number(e.target.value); if (v !== score) gradeManually(detail, i, v, detailIndex); }}
                    style={{ width: "50px", ...S.input, padding: "0.3rem 0.5rem" }} />
                  <span style={{ color: "var(--muted)" }}>/ {q.points} pts</span>
                </div>
              </div>
              <div style={{ background: "var(--cream)", padding: "0.75rem", borderRadius: "8px", fontSize: "0.9rem" }}>
                <strong>Answer: </strong>{ans?.value || <em style={{ color: "var(--muted)" }}>No answer</em>}
              </div>
              {q.correctAnswers?.length > 0 && (
                <div style={{ marginTop: "0.5rem", fontSize: "0.85rem", color: "var(--accent2)" }}>
                  ✓ Correct: {Array.isArray(q.correctAnswers) ? q.correctAnswers.join(", ") : q.correctAnswers}
                </div>
              )}
            </div>
          );
        })}
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: "1rem" }}>
          <button onClick={() => allowRetake(detail)} style={{ ...S.btn, background: "#fff3cd", color: "#856404", border: "none", fontSize: "0.85rem", borderRadius: "8px" }}>Allow Retake</button>
          <div style={{ display: "flex", gap: "0.5rem" }}>
            <button onClick={() => setDetailIndex(n => Math.max(0, n - 1))} disabled={detailIndex === 0} style={{ ...S.btn, ...S.btnGhost, opacity: detailIndex === 0 ? 0.4 : 1 }}>← Prev Student</button>
            <button onClick={() => setDetailIndex(n => Math.min(submissions.length - 1, n + 1))} disabled={detailIndex === submissions.length - 1} style={{ ...S.btn, ...S.btnGhost, opacity: detailIndex === submissions.length - 1 ? 0.4 : 1 }}>Next Student →</button>
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <div style={S.topBar}>
        <div>
          <h1 style={S.pageTitle}>{test.title} — Results</h1>
          <p style={S.pageSub}>{submissions.length} submission{submissions.length !== 1 ? "s" : ""}</p>
        </div>
        <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost }}>← Back</button>
      </div>
      {loading && <p>Loading...</p>}
      {!loading && submissions.length === 0 && (
        <div style={{ ...S.card, textAlign: "center", padding: "3rem" }}>
          <p style={{ color: "var(--muted)" }}>No submissions yet</p>
        </div>
      )}
      {submissions.length > 0 && (
        <div style={S.tableWrap}>
          <table style={S.table}>
            <thead>
              <tr>
                <th style={S.th}>Student Email</th>
                <th style={S.th}>Score</th>
                <th style={S.th}>Grade</th>
                <th style={S.th}>Submitted</th>
                <th style={S.th}>Status</th>
                <th style={S.th}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {submissions.map((sub, i) => (
                <tr key={sub.id}>
                  <td style={S.td}>{sub.email}</td>
                  <td style={S.td}>{sub.invalidated ? "—" : `${sub.totalScore || 0} / ${sub.totalPoints || 0}`}</td>
                  <td style={S.td}>
                    {sub.invalidated
                      ? <span style={{ ...S.badge, ...S.badgeClosed }}>Invalidated (0)</span>
                      : <span style={{ ...S.badge, ...S.badgeActive }}>{sub.percentage || 0}%</span>
                    }
                  </td>
                  <td style={{ ...S.td, fontSize: "0.85rem", color: "var(--muted)" }}>{new Date(sub.submittedAt).toLocaleString()}</td>
                  <td style={S.td}>
                    {sub.retakeAllowed ? <span style={{ ...S.badge, background: "#fff3cd", color: "#856404" }}>Retake Allowed</span> : ""}
                  </td>
                  <td style={S.td}>
                    <div style={{ display: "flex", gap: "0.4rem" }}>
                      <button onClick={() => setDetailIndex(i)} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.75rem", padding: "0.3rem 0.6rem" }}>View</button>
                      {!sub.invalidated && <button onClick={() => allowRetake(sub)} style={{ ...S.btn, background: "#fff3cd", color: "#856404", border: "none", fontSize: "0.75rem", padding: "0.3rem 0.6rem", borderRadius: "8px" }}>Allow Retake</button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// STUDENT TEST EXPERIENCE
// ═══════════════════════════════════════════════════════════════════════════════
function StudentTest({ test, email, onDone, onInvalidate }) {
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState(Array(test.questions.length).fill(null).map(() => ({ value: null }))); // length same regardless of order

  // If randomizeQuestions is enabled, shuffle the order once on mount (each student gets a unique order)
  const [questionOrder] = useState(() => {
    const order = test.questions.map((_, i) => i);
    if (test.randomizeQuestions) {
      // Fisher-Yates shuffle seeded by email so the same student always sees the same order on retry
      // but different students see different orders
      for (let i = order.length - 1; i > 0; i--) {
        // Use a hash of email + question index as a pseudo-random seed
        const seed = [...(email + i)].reduce((h, c) => (Math.imul(31, h) + c.charCodeAt(0)) | 0, 0);
        const j = Math.abs(seed) % (i + 1);
        [order[i], order[j]] = [order[j], order[i]];
      }
    }
    return order;
  });

  // Ordered questions and a map back to original index (needed for grading alignment)
  const orderedQuestions = questionOrder.map(i => test.questions[i]);
  const [finished, setFinished] = useState(false);
  const finishedRef = useRef(false);
  const [result, setResult] = useState(null);
  const [showDropdown, setShowDropdown] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const invalidatedRef = useRef(false);
  const [showCalculator, setShowCalculator] = useState(false);
  const hasMathQ = orderedQuestions.some(q => q.type === "math");
  const calculatorAllowed = test.allowCalculator || hasMathQ;

  const handleInvalidate = async () => {
    try {
      await apiFetch('/submissions', { method: 'POST', body: { testId: test.id, studentEmail: email, answers: [], invalidated: true } });
    } catch (e) { /* best effort */ }
    onInvalidate();
  };

  // Keep a ref to the latest handleInvalidate so the visibility effect never captures a stale closure
  const handleInvalidateRef = useRef(handleInvalidate);
  useEffect(() => { handleInvalidateRef.current = handleInvalidate; });

  // Invalidate on visibility change (tab switch / background)
  useEffect(() => {
    const handleVisibility = () => {
      if (document.hidden && !finishedRef.current && !invalidatedRef.current) {
        invalidatedRef.current = true;
        handleInvalidateRef.current();
      }
    };
    document.addEventListener("visibilitychange", handleVisibility);
    return () => document.removeEventListener("visibilitychange", handleVisibility);
  }, []);

  const setAnswer = (val) => {
    setAnswers(prev => prev.map((a, i) => i === currentQ ? { value: val } : a));
  };

  const toggleMultiSelect = (opt) => {
    const cur = answers[currentQ]?.value || [];
    const next = Array.isArray(cur)
      ? cur.includes(opt) ? cur.filter(o => o !== opt) : [...cur, opt]
      : [opt];
    setAnswer(next);
  };

  const finish = async () => {
    setSubmitting(true);
    setShowConfirm(false);
    // Grade locally using ordered questions (as student saw them)
    const q = orderedQuestions;
    const graded = answers.map((a, i) => {
      const question = q[i];
      let autoScore = 0;
      if (question.type === "multiple_choice" || question.type === "true_false") {
        // normalize both sides: trim + lowercase to avoid whitespace/case mismatches
        const correct = (question.correctAnswers?.[0] || "").trim().toLowerCase();
        const given = (a.value || "").trim().toLowerCase();
        if (correct && correct === given) autoScore = question.points || 0;
      } else if (question.type === "multiple_select") {
        const correct = new Set((question.correctAnswers || []).map(x => x.trim().toLowerCase()));
        const given = new Set((Array.isArray(a.value) ? a.value : []).map(x => x.trim().toLowerCase()));
        if (correct.size > 0 && [...correct].every(c => given.has(c)) && [...given].every(g => correct.has(g))) autoScore = question.points || 0;
      } else if (question.type === "short_answer" || question.type === "math") {
        const given = (a.value || "").trim();
        const accepted = (question.correctAnswers || []).map(x => x.trim());
        if (accepted.length > 0) {
          // First try exact case-insensitive match
          const exactMatch = accepted.some(x => x.toLowerCase() === given.toLowerCase());
          // Then try numeric equivalence (e.g. "4" matches "4.0", "4.00", "4.000")
          const givenNum = parseFloat(given);
          const numericMatch = !isNaN(givenNum) && accepted.some(x => {
            const xNum = parseFloat(x);
            return !isNaN(xNum) && Math.abs(givenNum - xNum) < 0.0001;
          });
          if (exactMatch || numericMatch) autoScore = question.points || 0;
        }
      }
      // essay: 0 auto score, teacher grades manually
      return { ...a, autoScore };
    });

    const totalScore = graded.reduce((s, a) => s + (a.autoScore || 0), 0);
    const totalPoints = q.reduce((s, q) => s + (q.points || 0), 0);
    const percentage = totalPoints > 0 ? Math.round((totalScore / totalPoints) * 100) : 0;
    // Re-map answers back to original question order so server grading aligns with sort_order
    const reorderedGraded = Array(graded.length);
    questionOrder.forEach((origIdx, shuffledIdx) => { reorderedGraded[origIdx] = graded[shuffledIdx]; });
    try {
      const res = await apiFetch('/submissions', { method: 'POST', body: { testId: test.id, studentEmail: email, answers: reorderedGraded } });
      // If server returned per-answer scores, use those (server has full answer key)
      // Otherwise fall back to local grading
      const serverAnswers = res.answers;
      // Server answers are in original order — re-map back to shuffled display order
      const displayGraded = (serverAnswers && serverAnswers.length === graded.length)
        ? graded.map((a, shuffledIdx) => {
            const origIdx = questionOrder[shuffledIdx];
            return { ...a, autoScore: serverAnswers[origIdx]?.autoScore ?? a.autoScore };
          })
        : graded;
      setResult({ totalScore: res.totalScore ?? totalScore, totalPoints: res.totalPoints ?? totalPoints, percentage: res.percentage ?? percentage, graded: displayGraded });
    } catch (e) {
      // Server save failed — still show result using local grading
      setResult({ totalScore, totalPoints, percentage, graded });
    } finally {
      setSubmitting(false);
    }
    finishedRef.current = true;
    setFinished(true);
  };

  if (finished && result) {
    const hasEssay = orderedQuestions.some(q => q.type === "essay");
    // A math/short_answer question is pending only if it got 0 AND has no local answer key (server graded = has autoScore > 0)
    const hasMathNoKey = orderedQuestions.some((q, i) => {
      if (q.type !== "math" && q.type !== "short_answer") return false;
      const ans = result.graded[i];
      const scored = ans?.autoScore > 0; // server graded it successfully
      return !scored && (!q.correctAnswers || q.correctAnswers.length === 0 || !q.correctAnswers[0]);
    });
    const allAutoGraded = !hasEssay && !hasMathNoKey;

    return (
      <div style={{ ...S.testWrap, justifyContent: "flex-start", paddingTop: "2rem", paddingBottom: "4rem" }}>
        {/* Score header card */}
        <div style={{ ...S.testCard, marginBottom: "1.5rem", maxWidth: "680px", width: "100%" }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", paddingBottom: "1.5rem" }}>
            <div style={{ fontSize: "3rem", marginBottom: "0.75rem" }}>
              {result.percentage >= 90 ? "🏆" : result.percentage >= 70 ? "✅" : result.percentage >= 50 ? "📝" : "😔"}
            </div>
            <h2 style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.8rem", marginBottom: "0.25rem" }}>Test Complete!</h2>
            <p style={{ color: "var(--muted)", fontSize: "0.9rem", marginBottom: "1.5rem" }}>{test.title}</p>

            {allAutoGraded ? (
              <>
                <div style={{ fontSize: "4rem", fontFamily: "'DM Serif Display',serif", lineHeight: 1 }}>{result.percentage}%</div>
                <p style={{ color: "var(--muted)", marginTop: "0.25rem", fontSize: "1rem" }}>
                  {result.totalScore} / {result.totalPoints} points
                </p>
              </>
            ) : (
              <>
                <div style={{ fontSize: "3rem", fontFamily: "'DM Serif Display',serif", lineHeight: 1 }}>
                  {result.percentage}%
                  <span style={{ fontSize: "1rem", color: "var(--muted)", fontFamily: "'DM Sans',sans-serif", marginLeft: "0.5rem" }}>so far</span>
                </div>
                <p style={{ color: "var(--muted)", marginTop: "0.25rem", fontSize: "0.95rem" }}>
                  {result.totalScore} / {result.totalPoints} pts auto-graded
                </p>
                <div style={{ marginTop: "0.75rem", background: "#fff3cd", color: "#856404", borderRadius: "8px", padding: "0.6rem 1rem", fontSize: "0.85rem", textAlign: "center" }}>
                  📋 {hasEssay && hasMathNoKey ? "Essay and unkeyed math questions" : hasEssay ? "Essay questions" : "Some math questions"} will be graded by your teacher. Your final score may change.
                </div>
              </>
            )}

            {/* Score bar */}
            <div style={{ width: "100%", marginTop: "1.25rem" }}>
              <div style={{ height: "8px", background: "var(--border)", borderRadius: "4px", overflow: "hidden" }}>
                <div style={{
                  height: "100%", borderRadius: "4px", transition: "width 1s ease",
                  width: `${result.percentage}%`,
                  background: result.percentage >= 90 ? "var(--accent2)" : result.percentage >= 70 ? "#5a9e6f" : result.percentage >= 50 ? "var(--gold)" : "var(--accent)"
                }} />
              </div>
            </div>
          </div>

          <hr style={S.divider} />

          {/* Quick stats row */}
          <div style={{ display: "flex", justifyContent: "space-around", textAlign: "center", paddingTop: "0.5rem" }}>
            <div>
              <div style={{ fontSize: "1.4rem", fontFamily: "'DM Serif Display',serif" }}>
                {result.graded.filter((a, i) => {
                  const q = orderedQuestions[i];
                  return q.type !== "essay" && a.autoScore === q.points && q.points > 0;
                }).length}
              </div>
              <div style={{ fontSize: "0.75rem", color: "var(--muted)", marginTop: "0.15rem" }}>Correct</div>
            </div>
            <div>
              <div style={{ fontSize: "1.4rem", fontFamily: "'DM Serif Display',serif" }}>
                {result.graded.filter((a, i) => {
                  const q = orderedQuestions[i];
                  if (q.type === "essay") return false;
                  const isPend = a.autoScore === 0 && !q.correctAnswers?.length && q.type !== "multiple_choice" && q.type !== "true_false" && q.type !== "multiple_select";
                  return a.autoScore === 0 && !isPend;
                }).length}
              </div>
              <div style={{ fontSize: "0.75rem", color: "var(--muted)", marginTop: "0.15rem" }}>Incorrect</div>
            </div>
            {(hasEssay || hasMathNoKey) && (
              <div>
                <div style={{ fontSize: "1.4rem", fontFamily: "'DM Serif Display',serif" }}>
                  {result.graded.filter((a, i) => {
                    const q = orderedQuestions[i];
                    if (q.type === "essay") return true;
                    if (a.autoScore === q.points && q.points > 0) return false;
                    return a.autoScore === 0 && !q.correctAnswers?.length && q.type !== "multiple_choice" && q.type !== "true_false" && q.type !== "multiple_select";
                  }).length}
                </div>
                <div style={{ fontSize: "0.75rem", color: "var(--muted)", marginTop: "0.15rem" }}>Pending</div>
              </div>
            )}
            <div>
              <div style={{ fontSize: "1.4rem", fontFamily: "'DM Serif Display',serif" }}>{orderedQuestions.length}</div>
              <div style={{ fontSize: "0.75rem", color: "var(--muted)", marginTop: "0.15rem" }}>Total Qs</div>
            </div>
          </div>
        </div>

        {/* Answer review — one card per question */}
        <div style={{ width: "100%", maxWidth: "680px" }}>
          <h3 style={{ color: "var(--paper)", fontFamily: "'DM Serif Display',serif", fontSize: "1.4rem", marginBottom: "1rem" }}>Answer Review</h3>
          {orderedQuestions.map((q, i) => {
            const ans = result.graded[i];
            const isEssay = q.type === "essay";
            const isMath = q.type === "math";
            // Use autoScore to determine result — correctAnswers may be stripped by server for students
            // If autoScore > 0 → definitely graded correctly (at least partial)
            // If essay → always pending (teacher grades manually)
            // If math/short_answer with autoScore === 0: check if we had a correct answer key locally
            // isCorrect: server graded it and gave full points
            const isCorrect = !isEssay && ans.autoScore === q.points && q.points > 0;
            // isPending: essay (always manual), OR math/short_answer with no local key AND server gave 0
            // If server gave points (autoScore > 0), it's NOT pending — it was graded
            const isPending = isEssay || (!isCorrect && ans.autoScore === 0 && !q.correctAnswers?.length && q.type !== 'multiple_choice' && q.type !== 'true_false' && q.type !== 'multiple_select');
            // hasCorrect: we have enough info to show correct/wrong (either local key or server graded it)
            const hasCorrect = q.correctAnswers?.length > 0 || ans.autoScore > 0 || isCorrect;
            const isWrong = !isPending && !isCorrect && hasCorrect;

            const borderColor = isPending ? "#b8860b" : isCorrect ? "#2d6a4f" : isWrong ? "#c84b31" : "var(--border)";

            return (
              <div key={q.id} style={{
                background: "var(--paper)", borderRadius: "14px", padding: "1.5rem",
                marginBottom: "1rem", border: `2px solid ${borderColor}`,
                position: "relative", overflow: "hidden"
              }}>
                {/* Color stripe on left */}
                <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: "4px", background: borderColor }} />

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.75rem", paddingLeft: "0.5rem" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "0.6rem" }}>
                    <span style={{ ...S.badge, background: "var(--cream)", color: "var(--muted)" }}>Q{i + 1}</span>
                    <span style={{ fontSize: "0.8rem", color: "var(--muted)" }}>
                      {q.type === "multiple_choice" ? "Multiple Choice" : q.type === "multiple_select" ? "Multiple Select" : q.type === "true_false" ? "True / False" : q.type === "short_answer" ? "Short Answer" : q.type === "math" ? "Math Question" : "Essay"}
                    </span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: "0.5rem" }}>
                    {isPending && <span style={{ ...S.badge, background: "#fff3cd", color: "#856404" }}>⏳ Pending</span>}
                    {isCorrect && <span style={{ ...S.badge, background: "#d4edda", color: "#2d6a4f" }}>✓ Correct</span>}
                    {isWrong && <span style={{ ...S.badge, background: "#fde8e4", color: "#c84b31" }}>✗ Incorrect</span>}
                    {!hasCorrect && !isPending && <span style={{ ...S.badge, background: "var(--cream)", color: "var(--muted)" }}>No key set</span>}
                    <span style={{ fontSize: "0.85rem", fontWeight: 600, color: isPending ? "var(--gold)" : isCorrect ? "var(--accent2)" : isWrong ? "var(--accent)" : "var(--muted)" }}>
                      {isPending ? `? / ${q.points}` : `${ans.autoScore} / ${q.points}`} pts
                    </span>
                  </div>
                </div>

                {/* Question text */}
                <p style={{ fontSize: "1rem", lineHeight: 1.5, marginBottom: "1rem", fontWeight: 500, paddingLeft: "0.5rem" }}>{q.text}</p>

                {/* Your answer */}
                <div style={{ paddingLeft: "0.5rem" }}>
                  <p style={{ fontSize: "0.75rem", fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--muted)", marginBottom: "0.4rem" }}>Your Answer</p>

                  {/* For MC/TF/MS — show options with highlighting */}
                  {["multiple_choice", "true_false"].includes(q.type) && (
                    <div>
                      {(q.type === "true_false" ? ["True", "False"] : q.options).map((opt, j) => {
                        const wasSelected = ans.value === opt;
                        const isCorrectOpt = q.correctAnswers?.includes(opt);
                        let optBg = "var(--white)", optBorder = "var(--border)", optColor = "var(--ink)";
                        if (!hasCorrect) {
                          // No answer key: just highlight selected in neutral ink
                          if (wasSelected) { optBg = "var(--cream)"; optBorder = "var(--ink)"; }
                        } else {
                          if (wasSelected && isCorrectOpt) { optBg = "#d4edda"; optBorder = "#2d6a4f"; optColor = "#2d6a4f"; }
                          else if (wasSelected && !isCorrectOpt) { optBg = "#fde8e4"; optBorder = "#c84b31"; optColor = "#c84b31"; }
                          else if (!wasSelected && isCorrectOpt) { optBg = "#edf7f1"; optBorder = "#2d6a4f"; optColor = "#2d6a4f"; }
                        }
                        return (
                          <div key={j} style={{ display: "flex", alignItems: "center", gap: "0.75rem", padding: "0.6rem 0.9rem", border: `1.5px solid ${optBorder}`, borderRadius: "8px", background: optBg, marginBottom: "0.4rem", color: optColor, fontSize: "0.9rem" }}>
                            <span style={{ fontWeight: 600, opacity: 0.6, minWidth: "16px" }}>{String.fromCharCode(65 + j)}.</span>
                            <span style={{ flex: 1 }}>{opt}</span>
                            {hasCorrect && wasSelected && isCorrectOpt && <span>✓</span>}
                            {hasCorrect && wasSelected && !isCorrectOpt && <span>✗</span>}
                            {hasCorrect && !wasSelected && isCorrectOpt && <span style={{ fontSize: "0.75rem" }}>← correct</span>}
                            {!hasCorrect && wasSelected && <span style={{ fontSize: "0.75rem", opacity: 0.5 }}>your answer</span>}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {q.type === "multiple_select" && (
                    <div>
                      {q.options.map((opt, j) => {
                        const wasSelected = Array.isArray(ans.value) && ans.value.includes(opt);
                        const isCorrectOpt = q.correctAnswers?.includes(opt);
                        let optBg = "var(--white)", optBorder = "var(--border)", optColor = "var(--ink)";
                        if (!hasCorrect) {
                          if (wasSelected) { optBg = "var(--cream)"; optBorder = "var(--ink)"; }
                        } else {
                          if (wasSelected && isCorrectOpt) { optBg = "#d4edda"; optBorder = "#2d6a4f"; optColor = "#2d6a4f"; }
                          else if (wasSelected && !isCorrectOpt) { optBg = "#fde8e4"; optBorder = "#c84b31"; optColor = "#c84b31"; }
                          else if (!wasSelected && isCorrectOpt) { optBg = "#edf7f1"; optBorder = "#2d6a4f"; optColor = "#2d6a4f"; }
                        }
                        return (
                          <div key={j} style={{ display: "flex", alignItems: "center", gap: "0.75rem", padding: "0.6rem 0.9rem", border: `1.5px solid ${optBorder}`, borderRadius: "8px", background: optBg, marginBottom: "0.4rem", color: optColor, fontSize: "0.9rem" }}>
                            <span>{wasSelected ? "☑" : "☐"}</span>
                            <span style={{ flex: 1 }}>{opt}</span>
                            {hasCorrect && wasSelected && isCorrectOpt && <span>✓</span>}
                            {hasCorrect && wasSelected && !isCorrectOpt && <span>✗</span>}
                            {hasCorrect && !wasSelected && isCorrectOpt && <span style={{ fontSize: "0.75rem" }}>← should select</span>}
                          </div>
                        );
                      })}
                    </div>
                  )}

                  {(q.type === "short_answer" || q.type === "essay" || q.type === "math") && (
                    <div style={{ background: !hasCorrect ? "var(--cream)" : isWrong ? "#fde8e4" : isPending ? "#fffbeb" : isCorrect ? "#edf7f1" : "var(--cream)", border: `1.5px solid ${!hasCorrect ? "var(--border)" : borderColor}`, borderRadius: "8px", padding: "0.75rem 1rem", fontSize: "0.9rem", color: "var(--ink)", lineHeight: 1.6, fontFamily: q.type === "math" ? "monospace" : "inherit" }}>
                      {ans.value || <em style={{ color: "var(--muted)" }}>No answer provided</em>}
                    </div>
                  )}

                  {/* Show correct answer for short_answer or math if wrong */}
                  {(q.type === "short_answer" || q.type === "math") && isWrong && hasCorrect && (
                    <div style={{ marginTop: "0.5rem", display: "flex", alignItems: "center", gap: "0.5rem" }}>
                      <span style={{ fontSize: "0.8rem", color: "var(--accent2)", fontWeight: 600 }}>✓ Accepted:</span>
                      <span style={{ fontSize: "0.85rem", color: "var(--accent2)", fontFamily: q.type === "math" ? "monospace" : "inherit" }}>{q.correctAnswers.join(", ")}</span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}

          {/* Done button */}
          <div style={{ textAlign: "center", marginTop: "1.5rem" }}>
            <p style={{ color: "rgba(247,244,239,0.5)", fontSize: "0.85rem", marginBottom: "1rem" }}>
              Your results have been saved and your teacher has been notified.
            </p>
            <button onClick={onDone} style={{ ...S.btn, background: "var(--paper)", color: "var(--ink)", padding: "0.85rem 2.5rem", fontSize: "1rem" }}>
              Done
            </button>
          </div>
        </div>
      </div>
    );
  }

  const q = orderedQuestions[currentQ];
  const ans = answers[currentQ];
  const progress = ((currentQ + 1) / orderedQuestions.length) * 100;
  const answeredCount = answers.filter(a => {
    if (a.value === null || a.value === undefined || a.value === "") return false;
    if (Array.isArray(a.value)) return a.value.length > 0;
    return true;
  }).length;

  return (
    <div style={{ ...S.testWrap, paddingBottom: showCalculator ? "420px" : "2rem" }}>
      {/* Confirmation Modal */}
      {showConfirm && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: "1rem" }}>
          <div style={{ background: "var(--paper)", borderRadius: "16px", padding: "2rem", maxWidth: "380px", width: "100%", textAlign: "center", boxShadow: "0 40px 80px rgba(0,0,0,0.5)" }}>
            <div style={{ fontSize: "2.5rem", marginBottom: "0.75rem" }}>📋</div>
            <h3 style={{ fontFamily: "'DM Serif Display',serif", fontSize: "1.5rem", marginBottom: "0.5rem" }}>Submit Test?</h3>
            <p style={{ color: "var(--muted)", fontSize: "0.9rem", marginBottom: "0.75rem", lineHeight: 1.5 }}>
              You answered {answeredCount} of {orderedQuestions.length} questions.
            </p>
            {answeredCount < orderedQuestions.length && (
              <div style={{ background: "#fff3cd", color: "#856404", borderRadius: "8px", padding: "0.6rem 0.9rem", fontSize: "0.85rem", marginBottom: "1rem" }}>
                ⚠️ {orderedQuestions.length - answeredCount} question{orderedQuestions.length - answeredCount !== 1 ? "s" : ""} left unanswered
              </div>
            )}
            <p style={{ color: "var(--muted)", fontSize: "0.85rem", marginBottom: "1.5rem" }}>You cannot go back after submitting.</p>
            <div style={{ display: "flex", gap: "0.75rem", justifyContent: "center" }}>
              <button onClick={() => setShowConfirm(false)} style={{ ...S.btn, ...S.btnGhost, flex: 1 }}>Go Back</button>
              <button onClick={finish} style={{ ...S.btn, ...S.btnSuccess, flex: 1 }}>Submit Now</button>
            </div>
          </div>
        </div>
      )}
      <div style={S.testCard}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
          <span style={{ fontSize: "0.85rem", color: "var(--muted)" }}>
            {test.title}
            {test.randomizeQuestions && <span style={{ marginLeft: "0.5rem", fontSize: "0.72rem", background: "#ede9fc", color: "#6b21a8", borderRadius: "10px", padding: "0.1rem 0.45rem", fontWeight: 600 }}>🔀</span>}
          </span>
          <span style={{ fontSize: "0.8rem", color: "var(--muted)" }}>{email}</span>
        </div>
        <div style={S.progressBar}>
          <div style={{ ...S.progressFill, width: `${progress}%` }} />
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.5rem" }}>
          <span style={S.questionNum}>Question {currentQ + 1} of {orderedQuestions.length}</span>
          <div style={{ position: "relative" }}>
            <button onClick={() => setShowDropdown(!showDropdown)}
              onBlur={() => setTimeout(() => setShowDropdown(false), 150)}
              style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", padding: "0.35rem 0.75rem" }}>
              Go to ▾
            </button>
            {showDropdown && (
              <div style={{ position: "absolute", right: 0, top: "calc(100% + 4px)", background: "var(--white)", border: "1.5px solid var(--border)", borderRadius: "8px", zIndex: 100, minWidth: "160px", boxShadow: "0 8px 24px rgba(0,0,0,0.1)", maxHeight: "200px", overflowY: "auto" }}>
                {orderedQuestions.map((qq, i) => (
                  <div key={`goto-q-${i}`} onClick={() => { setCurrentQ(i); setShowDropdown(false); }}
                    style={{ padding: "0.6rem 1rem", cursor: "pointer", fontSize: "0.85rem", background: i === currentQ ? "var(--cream)" : "transparent", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span>Q{i + 1}</span>
                    {answers[i]?.value !== null && answers[i]?.value !== undefined && answers[i]?.value !== "" && (
                      <span style={{ color: "var(--accent2)", fontSize: "0.7rem" }}>✓</span>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <p style={{ fontSize: "0.75rem", color: "var(--muted)", marginBottom: "0.5rem" }}>
          {q.type === "multiple_choice" ? "Select one" : q.type === "multiple_select" ? "Select all that apply" : q.type === "true_false" ? "True or False" : q.type === "short_answer" ? "Short answer" : q.type === "math" ? "Math question" : "Essay"}
          {" · "}{q.points} pt{q.points !== 1 ? "s" : ""}
          {calculatorAllowed && !showCalculator && (
            <button onClick={() => setShowCalculator(true)} style={{ marginLeft: "0.75rem", background: "#e8f4fd", border: "none", borderRadius: "6px", padding: "0.1rem 0.5rem", color: "#1a6fa8", cursor: "pointer", fontSize: "0.75rem", fontWeight: 600 }}>🧮 Calculator</button>
          )}
          {calculatorAllowed && showCalculator && (
            <button onClick={() => setShowCalculator(false)} style={{ marginLeft: "0.75rem", background: "#d4edda", border: "none", borderRadius: "6px", padding: "0.1rem 0.5rem", color: "#2d6a4f", cursor: "pointer", fontSize: "0.75rem", fontWeight: 600 }}>🧮 Hide Calc</button>
          )}
        </p>
        {q.type !== "math" && <p style={S.questionText}>{q.text}</p>}

        {/* Answer input by type */}
        {["multiple_choice", "true_false"].includes(q.type) && (
          <div>
            {(q.type === "true_false" ? ["True", "False"] : q.options).map((opt, i) => (
              <button key={`mc-${i}-${opt}`} onClick={() => setAnswer(opt)}
                style={{ ...S.optionBtn, ...(ans.value === opt ? S.optionBtnSelected : {}) }}>
                <span style={{ marginRight: "0.75rem", fontWeight: 600, opacity: 0.5 }}>{String.fromCharCode(65 + i)}.</span>{opt}
              </button>
            ))}
          </div>
        )}
        {q.type === "multiple_select" && (
          <div>
            {q.options.map((opt, i) => {
              const selected = Array.isArray(ans.value) && ans.value.includes(opt);
              return (
                <button key={`ms-${i}-${opt}`} onClick={() => toggleMultiSelect(opt)}
                  style={{ ...S.optionBtn, ...(selected ? S.optionBtnSelected : {}) }}>
                  <span style={{ marginRight: "0.75rem" }}>{selected ? "☑" : "☐"}</span>{opt}
                </button>
              );
            })}
          </div>
        )}
        {q.type === "short_answer" && (
          <input style={S.input} value={ans.value || ""} onChange={e => setAnswer(e.target.value)} placeholder="Your answer..." />
        )}
        {q.type === "essay" && (
          <textarea style={{ ...S.textarea, minHeight: "140px" }} value={ans.value || ""} onChange={e => setAnswer(e.target.value)} placeholder="Write your answer here..." />
        )}
        {q.type === "math" && (
          <div>
            <p style={{ fontSize: "0.8rem", color: "var(--muted)", marginBottom: "0.5rem", fontFamily: "monospace" }}>
              {q.text && <span style={{ background: "#f0f7ff", padding: "0.3rem 0.6rem", borderRadius: "6px", display: "inline-block", marginBottom: "0.5rem", color: "#1a3a5c", fontSize: "1rem", wordBreak: "break-all" }}>{q.text}</span>}
            </p>
            <input style={{ ...S.input, fontFamily: "monospace", fontSize: "1.1rem" }} value={ans.value || ""} onChange={e => setAnswer(e.target.value)} placeholder="Enter your answer..." />
          </div>
        )}

        <div style={S.navRow}>
          <button onClick={() => setCurrentQ(n => n - 1)} disabled={currentQ === 0}
            style={{ ...S.btn, ...S.btnGhost, opacity: currentQ === 0 ? 0.4 : 1 }}>← Previous</button>
          {currentQ < orderedQuestions.length - 1 ? (
            <button onClick={() => setCurrentQ(n => n + 1)} style={{ ...S.btn, ...S.btnPrimary }}>Next →</button>
          ) : (
            <button onClick={() => setShowConfirm(true)} disabled={submitting} style={{ ...S.btn, ...S.btnSuccess }}>
              {submitting ? "Submitting..." : "✓ Finish Test"}
            </button>
          )}
        </div>
      </div>
      {showCalculator && calculatorAllowed && (
        <ScientificCalculator onClose={() => setShowCalculator(false)} />
      )}
    </div>
  );
}

        <div style={{ ...S.card, textAlign: "center", padding: "4rem" }}>

        {decks.map(deck => (
          <div key={deck.id} style={{ ...S.card, borderLeft: "4px solid #2d6a4f" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.5rem" }}>

              <span style={{ ...S.badge, ...(deck.status === "active" ? S.badgeActive : S.badgeDraft) }}>
                {deck.status === "active" ? "active" : "inactive"}

              <button onClick={() => toggleStatus(deck)} style={{ ...S.btn, background: deck.status === "active" ? "#fde8e4" : "#d4edda", color: deck.status === "active" ? "#c84b31" : "#2d6a4f", border: "none", fontSize: "0.8rem", padding: "0.4rem 0.8rem", borderRadius: "8px" }}>

// DECK BUILDER (Teacher)
// ═══════════════════════════════════════════════════════════════════════════════
function DeckBuilder({ deck, onSave, onCancel }) {
  const [title, setTitle] = useState(deck?.title || "");
  const [description, setDescription] = useState(deck?.description || "");
  const [cards, setCards] = useState(deck?.cards || [{ id: generateId(), front: "", back: "", hint: "" }]);
  const [err, setErr] = useState("");

  const addCard = () => setCards(prev => [...prev, { id: generateId(), front: "", back: "", hint: "" }]);
  const updateCard = (idx, patch) => setCards(prev => prev.map((c, i) => i === idx ? { ...c, ...patch } : c));
  const removeCard = (idx) => { if (cards.length === 1) return; setCards(prev => prev.filter((_, i) => i !== idx)); };
  const moveCard = (idx, dir) => {
    const cs = [...cards]; const t = idx + dir;
    if (t < 0 || t >= cs.length) return;
    [cs[idx], cs[t]] = [cs[t], cs[idx]]; setCards(cs);
  };
  const [saving, setSaving] = useState(false);
  const handleSave = async () => {
    if (!title.trim()) { setErr("Please add a title."); return; }
    for (let i = 0; i < cards.length; i++) {
      if (!cards[i].front.trim() || !cards[i].back.trim()) { setErr("Card " + (i+1) + " needs both a front and back."); return; }
    }
    const deckData = { title: title.trim(), description: description.trim(), cards: cards, code: deck?.code || generateCode(), status: deck?.status || "inactive", createdAt: deck?.createdAt || Date.now(), updatedAt: Date.now() };
    if (deck?.id) deckData.id = deck.id;
    setSaving(true);
    setErr("");
    try {
      await onSave(deckData);
    } catch (e) {
      setErr("Failed to save: " + e.message);
      setSaving(false);
    }
  };

  return (
    <>
      <div style={S.topBar}>
        <div>
          <h1 style={S.pageTitle}>{deck ? "Edit Deck" : "Create Flashcard Deck"}</h1>
          <p style={S.pageSub}>Build your study set — {cards.length} card{cards.length !== 1 ? "s" : ""}</p>
        </div>
        <div style={{ display: "flex", gap: "0.75rem" }}>
          <button onClick={onCancel} disabled={saving} style={{ ...S.btn, ...S.btnGhost, opacity: saving ? 0.5 : 1 }}>Cancel</button>
          <button onClick={handleSave} disabled={saving} style={{ ...S.btn, ...S.btnPrimary, opacity: saving ? 0.7 : 1 }}>{saving ? "Saving..." : "Save Deck"}</button>
        </div>
      </div>
      {err && <div style={S.error}>{err}</div>}
      <div style={{ ...S.card, marginBottom: "1.5rem" }}>
        <div style={S.fieldGroup}>
          <label style={S.label}>Deck Title *</label>
          <input style={S.input} value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Chapter 5 Vocabulary" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Description (optional)</label>
          <input style={S.input} value={description} onChange={e => setDescription(e.target.value)} placeholder="What is this deck for?" />
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
        <h3 style={{ fontFamily: "'DM Serif Display',serif" }}>{cards.length} Card{cards.length !== 1 ? "s" : ""}</h3>
        <button onClick={addCard} style={{ ...S.btn, ...S.btnSuccess, fontSize: "0.85rem", padding: "0.5rem 1rem" }}>+ Add Card</button>
      </div>
      {cards.map((card, idx) => (
        <div key={card.id} style={{ ...S.card, marginBottom: "0.75rem", borderLeft: "4px solid #2d6a4f" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "1rem" }}>
            <span style={{ ...S.badge, background: "#d4edda", color: "#2d6a4f" }}>Card {idx + 1}</span>
            <div style={{ display: "flex", gap: "0.4rem" }}>
              <button onClick={() => moveCard(idx, -1)} disabled={idx === 0} style={{ background: "none", border: "none", cursor: "pointer", opacity: idx === 0 ? 0.3 : 1, fontSize: "1rem" }}>↑</button>
              <button onClick={() => moveCard(idx, 1)} disabled={idx === cards.length - 1} style={{ background: "none", border: "none", cursor: "pointer", opacity: idx === cards.length - 1 ? 0.3 : 1, fontSize: "1rem" }}>↓</button>
              <button onClick={() => removeCard(idx)} disabled={cards.length === 1} style={{ background: "none", border: "none", cursor: "pointer", color: cards.length === 1 ? "var(--border)" : "var(--danger)", fontSize: "1rem" }}>✕</button>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "1rem" }}>
            <div>
              <label style={S.label}>Front (Question / Term) *</label>
              <textarea style={{ ...S.textarea, minHeight: "80px" }} value={card.front} onChange={e => updateCard(idx, { front: e.target.value })} placeholder="What appears on the front?" />
            </div>
            <div>
              <label style={S.label}>Back (Answer / Definition) *</label>
              <textarea style={{ ...S.textarea, minHeight: "80px" }} value={card.back} onChange={e => updateCard(idx, { back: e.target.value })} placeholder="What appears on the back?" />
            </div>
          </div>
          <div style={{ marginTop: "0.75rem" }}>
            <label style={S.label}>Hint (optional)</label>
            <input style={S.input} value={card.hint || ""} onChange={e => updateCard(idx, { hint: e.target.value })} placeholder="Optional hint to help students remember..." />
          </div>
        </div>
      ))}
      <div style={{ textAlign: "center", marginTop: "1.5rem" }}>
        <button onClick={addCard} style={{ ...S.btn, ...S.btnGhost }}>+ Add Another Card</button>
      </div>
    </>
  );
}

// FLASHCARD STUDENT LOGIN
// ═══════════════════════════════════════════════════════════════════════════════
function FlashcardLogin({ onEnter, onBack }) {
  const [email, setEmail] = useState("");
  const [code, setCode] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const handleEnter = async () => {
    if (!email.trim() || !code.trim()) { setErr("Please fill in both fields."); return; }
    if (!/\S+@\S+\.\S+/.test(email)) { setErr("Please enter a valid email."); return; }
    setLoading(true); setErr("");
    let foundDeck = null;
    try {
      const data = await apiFetch('/decks/by-code/' + code.toUpperCase());
      foundDeck = data.deck;
    } catch (e) {
      setErr("Invalid or inactive deck code."); setLoading(false); return;
    }
    setLoading(false);
    onEnter({ deck: foundDeck, email: email.toLowerCase() });
  };

  return (
    <div style={S.authWrap}>
      <div style={S.authBox}>
        <button onClick={onBack} style={{ ...S.btn, ...S.btnGhost, fontSize: "0.8rem", marginBottom: "1.5rem" }}>← Back</button>
        <div style={{ fontSize: "2.5rem", marginBottom: "0.5rem" }}>🃏</div>
        <h2 style={S.authTitle}>Flashcard Study</h2>
        <p style={S.authSub}>Enter your deck code to start studying</p>
        {err && <div style={S.error}>{err}</div>}
        <div style={S.fieldGroup}>
          <label style={S.label}>Your Email</label>
          <input style={S.input} type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="student@school.edu" />
        </div>
        <div style={S.fieldGroup}>
          <label style={S.label}>Deck Code</label>
          <input type="text" value={code} onChange={e => setCode(e.target.value.toUpperCase())} onKeyDown={e => e.key === "Enter" && handleEnter()} placeholder="ABC123" maxLength={8} style={{ ...S.input, letterSpacing: "0.2em", textTransform: "uppercase" }} />
        </div>
        <button onClick={handleEnter} disabled={loading} style={{ ...S.btn, ...S.btnSuccess, width: "100%" }}>
          {loading ? "Loading..." : "Start Studying →"}
        </button>
      </div>
    </div>
  );
}
